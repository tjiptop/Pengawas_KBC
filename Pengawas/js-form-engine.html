            if (q && (q.auto_submit || q.autosubmit)) {
                // Ensure scanner is fully stopped BEFORE submitting
                this.stopScanner().then(() => {
                    this.handleAutoSubmit(q);
                });
            } else {
                // Add small delay before stopping to ensure UI update
                setTimeout(() => {
                    this.stopScanner();
                }, 100);
            }
        },

        stopScanner() {
            const modal = document.getElementById('scanner-modal');

            return new Promise((resolve) => {
                if (this.html5QrCode) {
                    // Safeguard against hang: Force close after 800ms if stop() fails/hangs
                    const stopPromise = this.html5QrCode.stop();
                    const timeoutPromise = new Promise((_, reject) =>
                        setTimeout(() => reject("Scanner stop timeout"), 800)
                    );

                    Promise.race([stopPromise, timeoutPromise])
                        .then(() => {
                            this._cleanupScanner(modal);
                            resolve();
                        }).catch(err => {
                            console.warn("Scanner stopped with error or timeout:", err);
                            this._cleanupScanner(modal);
                            resolve(); // Resolve anyway to continue flow
                        });
                } else {
                    if (modal) modal.style.display = 'none';
                    resolve();
                }
            });
        },

        _cleanupScanner(modal) {
            try {
                if (this.html5QrCode) this.html5QrCode.clear();
            } catch (e) {
                console.warn("Scanner clear error:", e);
            }
            this.html5QrCode = null;
            if (modal) modal.style.display = 'none';
        },

        generateQRCode(fieldName, text, size = 128) {
            const container = document.getElementById('qr-' + fieldName);
            if (!container) return;

            container.innerHTML = ''; // Clear previous
            if (!text) {
                container.parentElement.style.display = 'none'; // Hide if empty? or show placeholder. Behaving like 'relevant' might be better. 
                // Actually, let's just leave it empty or show placeholder message defined in render.
                // If the logic above in render showed "No data", we might want to toggle that visibility.
                // For now simplicity: just clear.
                return;
            }

            try {
                new QRCode(container, {
                    text: String(text),
                    width: size,
                    height: size,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (e) {
                console.error("QR Gen Error", e);
                container.innerText = "Error generating QR";
            }
        },

        evalDefault(def) {
            if (!def) return def;
            if (typeof def !== 'string') return def;
            // Strict check: if it doesn't contain $, return as is (optimization)
            if (!def.includes('$')) return def;

            try {
                // Robust user retrieval from App state or direct local storage fallback
                let user = App.state.user;
                if (!user || (!user.Nama && !user.NIP && !user.full_name && !user.username)) {
                    try {
                        const stored = localStorage.getItem('pengawas_user');
                        if (stored) user = JSON.parse(stored);
                    } catch(e) {
                        console.warn('Failed to parse localStorage user in evalDefault:', e);
                    }
                }
                user = user || {};

                // 1. Prepare Context Variables
                let madrasah = null;
                if (this.madrasahContext) {
                    madrasah = this.madrasahContext;
                } else if (user.role === 'madrasah' && App.state && App.state.madrasahs) {
                    madrasah = App.state.madrasahs.find(m => m.madrasah_id === (user.username || user.NIP));
                }

                const today = new Date();
                const pad = (n) => String(n).padStart(2, '0');
                const dateStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
                const timeStr = `${pad(today.getHours())}:${pad(today.getMinutes())}`;

                // Map of all available variables with fully robust casing fallbacks
                const vars = {
                    '$user_fullname': user.full_name || user.Nama || user.Nama_Lengkap || user.nama || user.nama_lengkap || '',
                    '$user_username': user.username || user.NIP || user.nip || '',
                    '$today': dateStr,
                    '$now': `${dateStr}T${timeStr}`,
                    '$time': timeStr,
                    '$madrasah_name': (madrasah && madrasah.name) || '',
                    '$madrasah_id': (madrasah && madrasah.madrasah_id) || (user.role === 'madrasah' ? user.username : '') || '',
                    '$madrasah_nsm': (madrasah && madrasah.nsm) || (user.role === 'madrasah' ? user.username : '') || '',
                    '$madrasah_level': (madrasah && madrasah.level) || '',
                    '$madrasah_province': (madrasah && madrasah.province) || '',
                    '$madrasah_district': (madrasah && madrasah.district) || '',
                    '$madrasah_sub_district': (madrasah && madrasah.subdistrict) || '',
                    '$madrasah_village': (madrasah && madrasah.village) || '',
                    '$madrasah_village_id': (madrasah && madrasah.village_id) || '',
                    '$madrasah_address': (madrasah && madrasah.address) || ''
                };

                // 2. Perform Replacement
                // If the definition IS exactly one variable, return the value directly (preserves types if we had non-string vars, though here they are all strings)
                if (vars.hasOwnProperty(def)) {
                    return vars[def];
                }

                // Otherwise, perform string interpolation
                let result = def;
                for (const [key, value] of Object.entries(vars)) {
                    if (result.includes(key)) {
                        // Global replace all occurrences
                        result = result.split(key).join(value);
                    }
                }

                return result;

            } catch (e) {
                console.warn('evalDefault error:', e);
                return def;
            }
        },

        tableAddRow(name) {
            const q = this.def.questions.find(x => x.name == name);
            if (!q) return;
            if (!this.data[name]) this.data[name] = [];

            // Initialize new row with all column names as empty strings
            const newRow = {};
            if (q.columns) {
                q.columns.forEach(col => {
                    newRow[col.name] = '';
                });
            }

            this.data[name].push(newRow);
            this.reRenderField(q);
        },

        tableRemoveRow(name, idx) {
            const q = this.def.questions.find(x => x.name == name);
            if (!this.data[name]) return;
            this.data[name].splice(idx, 1);
            this.reRenderField(q);
        },

        processLookups() {
            if (!this.def || !this.def.questions) return;

            const lookupFields = this.def.questions.filter(q => q.lookup && q.lookup.sheet && q.lookup.filter_col && q.lookup.filter_val && q.lookup.target_col);

            if (lookupFields.length === 0) return;

            lookupFields.forEach(q => {
                const l = q.lookup;
                // Resolve filter value (handle variables like $madrasah_id)
                const filterVal = this.evalDefault(l.filter_val);

                if (!filterVal && l.filter_val.includes('$')) {
                    // console.warn(`Lookup skipped for ${q.name}: Filter value ('${l.filter_val}') resolved to empty.`);
                    return;
                }
                const actualFilterVal = filterVal || l.filter_val;

                const el = document.getElementById('f-' + q.name);
                if (el && !el.value) { // Only lookup if empty (or maybe always? User said "get variable... can take data". Assume if empty or readonly)
                    if (q.readonly) el.placeholder = "Loading...";
                }

                google.script.run
                    .withSuccessHandler(result => {
                        if (result && result.success) {
                            const value = result.data;
                            if (value !== null && value !== undefined) {
                                this.data[q.name] = value;
                                const fieldEl = document.getElementById('f-' + q.name);
                                if (fieldEl) {
                                    fieldEl.value = value;
                                    fieldEl.dispatchEvent(new Event('change')); // Trigger logic
                                }
                            } else {
                                const fieldEl = document.getElementById('f-' + q.name);
                                if (fieldEl && q.readonly) fieldEl.placeholder = "Not found";
                            }
                        }
                    })
                    .apiLookup(l.sheet, l.filter_col, actualFilterVal, l.target_col);
            });
        },

        // ===== INTERACTIVE INPUT SELECTION HANDLERS =====
        selectLikert(name, val, labelEl) {
            if (!labelEl) return;
            const container = labelEl.closest('.likert-container');
            if (container) {
                container.querySelectorAll('.likert-option').forEach(opt => {
                    opt.classList.remove('active');
                    const rad = opt.querySelector('input[type="radio"]');
                    if (rad) rad.checked = false;
                });
            }
            labelEl.classList.add('active');
            const radio = labelEl.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;

            this.data[name] = val;
            this.hasUnsavedChanges = true;
            this.runLogic();

            const fieldDef = this.def.questions.find(f => f.name === name);
            this.handleFieldComplete(name, val);
            this.handleAutoSubmit(fieldDef);
        },

        selectSegment(name, val, el) {
            if (!el) return;
            const container = el.closest('.segmented-control');
            if (container) {
                const fieldDef = this.def.questions.find(q => q.name === name) || {};
                const customColor = fieldDef.button_color || 'var(--color-primary)';
                container.querySelectorAll('.segmented-option').forEach(opt => {
                    if (opt === el) {
                        opt.classList.add('active');
                        opt.style.background = customColor;
                        opt.style.color = 'white';
                        opt.style.fontWeight = '600';
                    } else {
                        opt.classList.remove('active');
                        opt.style.background = 'transparent';
                        opt.style.color = 'var(--color-text)';
                        opt.style.fontWeight = '500';
                    }
                });
            }
            const input = document.getElementById('f-' + name);
            if (input) {
                input.value = val;
                input.dispatchEvent(new Event('change', { bubbles: true }));
            }

            this.data[name] = val;
            this.hasUnsavedChanges = true;
            this.runLogic();

            const fieldDef = this.def.questions.find(f => f.name === name);
            this.handleFieldComplete(name, val);
            this.handleAutoSubmit(fieldDef);
        },

        setStar(name, starVal) {
            this.data[name] = starVal;
            const input = document.getElementById('f-' + name);
            if (input) {
                input.value = starVal;
                input.dispatchEvent(new Event('change', { bubbles: true }));
            }

            const container = document.querySelector(`.star-container[data-field="${name}"]`);
            if (container) {
                container.querySelectorAll('.star-item').forEach(item => {
                    const val = parseInt(item.dataset.value);
                    if (val <= starVal) {
                        item.classList.add('filled');
                        item.style.color = '#ffc107';
                    } else {
                        item.classList.remove('filled');
                        item.style.color = '#e0e0e0';
                    }
                });
                const valLabel = container.querySelector('.star-rating-value');
                if (valLabel) valLabel.textContent = starVal > 0 ? starVal : '';
            }

            this.hasUnsavedChanges = true;
            this.runLogic();

            const fieldDef = this.def.questions.find(f => f.name === name);
            this.handleFieldComplete(name, starVal);
            this.handleAutoSubmit(fieldDef);
        },

        setSmiley(name, smileyVal) {
            this.data[name] = smileyVal;
            const input = document.getElementById('f-' + name);
            if (input) {
                input.value = smileyVal;
                input.dispatchEvent(new Event('change', { bubbles: true }));
            }

            const container = document.querySelector(`.smiley-container[data-field="${name}"]`);
            if (container) {
                container.querySelectorAll('.smiley-item').forEach(item => {
                    const val = parseInt(item.dataset.value);
                    if (val === smileyVal) {
                        item.classList.add('selected');
                        item.style.opacity = '1';
                        item.style.transform = 'scale(1.1)';
                    } else {
                        item.classList.remove('selected');
                        item.style.opacity = '0.5';
                        item.style.transform = 'scale(1)';
                    }
                });
            }

            this.hasUnsavedChanges = true;
            this.runLogic();

            const fieldDef = this.def.questions.find(f => f.name === name);
            this.handleFieldComplete(name, smileyVal);
            this.handleAutoSubmit(fieldDef);
        },

        // ===== FILE & IMAGE UPLOAD HANDLERS =====
        doc(name, inputEl) {
            if (!inputEl || !inputEl.files || inputEl.files.length === 0) return;
            const file = inputEl.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const fileObj = {
                    data: e.target.result,
                    name: file.name,
                    size: file.size,
                    type: file.type
                };
                this.data[name] = fileObj;
                this.hasUnsavedChanges = true;
                this.reRenderField(this.def.questions.find(q => q.name === name));
                this.runLogic();
            };
            reader.readAsDataURL(file);
        },

        img(name, inputEl) {
            if (!inputEl || !inputEl.files || inputEl.files.length === 0) return;
            const file = inputEl.files[0];
            const fieldDef = this.def.questions.find(q => q.name === name) || {};
            const limit = (fieldDef.max_size || CONFIG.FILE.IMAGE_MAX_SIZE_MB || 5) * 1024 * 1024;
            if (file.size > limit) {
                App.alert(`File terlalu besar (Maksimal ${fieldDef.max_size || 5}MB sebelum kompresi)`, 'Gagal');
                inputEl.value = '';
                return;
            }

            App.loading(true, "Memproses gambar...");
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgObj = new Image();
                imgObj.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = CONFIG.FILE.IMAGE_MAX_DIMENSION;
                    let w = imgObj.width, h = imgObj.height;
                    if (w > h) {
                        if (w > MAX) { h *= MAX / w; w = MAX; }
                    } else {
                        if (h > MAX) { w *= MAX / h; h = MAX; }
                    }
                    canvas.width = Math.floor(w);
                    canvas.height = Math.floor(h);
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, w, h);
                    ctx.drawImage(imgObj, 0, 0, w, h);
                    const b64 = canvas.toDataURL('image/jpeg', CONFIG.FILE.IMAGE_QUALITY);

                    this.data[name] = b64;
                    this.hasUnsavedChanges = true;
                    
                    const hiddenInput = document.getElementById('f-' + name);
                    if (hiddenInput) hiddenInput.value = b64;

                    const prev = document.getElementById('prev-' + name);
                    if (prev) prev.innerHTML = `<img src="${b64}" style="max-width:100%;border-radius:4px;margin-top:5px;border:1px solid var(--color-border)">`;

                    App.loading(false);
                    this.reRenderField(fieldDef);
                    this.runLogic();
                };
                imgObj.src = e.target.result;
            };
            reader.readAsDataURL(file);
        },

        multiDoc(name, inputEl) {
            if (!inputEl || !inputEl.files || inputEl.files.length === 0) return;
            const files = inputEl.files;
            if (!Array.isArray(this.data[name])) this.data[name] = [];

            const fieldDef = this.def.questions.find(q => q.name === name) || {};
            const maxFiles = fieldDef.max_files || 5;
            const currentCount = this.data[name].length;
            const remainingSlots = maxFiles - currentCount;
            const filesToProcess = Array.from(files).slice(0, remainingSlots);

            if (filesToProcess.length === 0) return;

            let processedCount = 0;
            filesToProcess.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileObj = {
                        data: e.target.result,
                        name: file.name,
                        size: file.size,
                        type: file.type
                    };
                    this.data[name].push(fileObj);
                    processedCount++;
                    if (processedCount === filesToProcess.length) {
                        this.hasUnsavedChanges = true;
                        this.reRenderField(fieldDef);
                        this.runLogic();
                    }
                };
                reader.readAsDataURL(file);
            });
        },

        multiImg(name, inputEl) {
            if (!inputEl || !inputEl.files || inputEl.files.length === 0) return;
            const files = inputEl.files;
            if (!Array.isArray(this.data[name])) this.data[name] = [];

            const fieldDef = this.def.questions.find(q => q.name === name) || {};
            const maxImages = fieldDef.max_images || 5;
            const maxSizeBytes = (fieldDef.max_size || CONFIG.FILE.IMAGE_MAX_SIZE_MB || 5) * 1024 * 1024;

            const remaining = maxImages - this.data[name].length;
            if (remaining <= 0) {
                App.alert(`Maximum ${maxImages} gambar diperbolehkan`, 'Peringatan');
                inputEl.value = '';
                return;
            }

            const filesToProcess = Math.min(files.length, remaining);
            if (files.length > remaining) {
                App.alert(`Hanya tersisa ${remaining} slot. Memproses ${remaining} gambar pertama.`, 'Info');
            }

            App.loading(true, `Memproses ${filesToProcess} gambar...`);

            let processedCount = 0;
            const filesArray = Array.from(files).slice(0, filesToProcess);

            filesArray.forEach(file => {
                if (file.size > maxSizeBytes) {
                    App.alert(`File ${file.name} terlalu besar (Maksimal ${fieldDef.max_size || 5}MB sebelum kompresi)`, 'Gagal');
                    processedCount++;
                    if (processedCount === filesToProcess.length) {
                        App.loading(false);
                        this.reRenderField(fieldDef);
                    }
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgObj = new Image();
                    imgObj.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = CONFIG.FILE.IMAGE_MAX_DIMENSION;
                        let w = imgObj.width, h = imgObj.height;
                        if (w > h) {
                            if (w > MAX) { h *= MAX / w; w = MAX; }
                        } else {
                            if (h > MAX) { w *= MAX / h; h = MAX; }
                        }
                        canvas.width = Math.floor(w);
                        canvas.height = Math.floor(h);
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "#FFFFFF";
                        ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(imgObj, 0, 0, w, h);
                        const b64 = canvas.toDataURL('image/jpeg', CONFIG.FILE.IMAGE_QUALITY);

                        this.data[name].push(b64);
                        processedCount++;

                        if (processedCount === filesToProcess.length) {
                            App.loading(false);
                            this.hasUnsavedChanges = true;
                            this.reRenderField(fieldDef);
                            this.runLogic();
                        }
                    };
                    imgObj.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            inputEl.value = '';
        },

        removeMultiDoc(name, idx) {
            const q = this.def.questions.find(x => x.name == name);
            if (this.data[name] && Array.isArray(this.data[name])) {
                this.data[name].splice(idx, 1);
                this.hasUnsavedChanges = true;
                this.reRenderField(q);
                this.runLogic();
            }
        },

        removeMultiImg(name, idx) {
            const q = this.def.questions.find(x => x.name == name);
            if (this.data[name] && Array.isArray(this.data[name])) {
                this.data[name].splice(idx, 1);
                this.hasUnsavedChanges = true;
                this.reRenderField(q);
                this.runLogic();
            }
        },

        // ===== SPEECH FEATURES =====
        // Initialize Speech Recognition
        initSpeech() {
            // Check if SpeechRecognition is available
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (SpeechRecognition) {
                this.recognition = new SpeechRecognition();
                this.recognition.lang = 'id-ID'; // Indonesian
                this.recognition.continuous = false;
                this.recognition.interimResults = false;
                this.recognition.maxAlternatives = 1;
            } else {
                console.warn('Speech Recognition not supported in this browser');
                this.recognition = null;
            }
        },

        // Text-to-Speech: Read text aloud
        speak(text) {
            if (!text) return;

            // Check if Speech Synthesis is available
            if (!window.speechSynthesis) {
                Utils.alert('Text-to-Speech tidak didukung di browser ini');
                return;
            }

            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID'; // Indonesian
            utterance.rate = 0.9; // Slightly slower for clarity
            utterance.pitch = 1;
            utterance.volume = 1;

            // Try to find Indonesian voice
            const voices = window.speechSynthesis.getVoices();
            const indonesianVoice = voices.find(voice => voice.lang.startsWith('id'));
            if (indonesianVoice) {
                utterance.voice = indonesianVoice;
            }

            window.speechSynthesis.speak(utterance);
        },

        // Speech-to-Text: Start listening for a specific field
        listen(fieldId) {
            if (!this.recognition) {
                this.initSpeech();
            }

            if (!this.recognition) {
                Utils.alert('Voice input tidak didukung di browser ini. Gunakan Chrome untuk hasil terbaik.');
                return;
            }

            const inputEl = document.getElementById('f-' + fieldId);
            const micBtn = document.getElementById('mic-' + fieldId);

            if (!inputEl) return;

            // Visual feedback: Change mic button color
            if (micBtn) {
                micBtn.style.background = '#dc3545'; // Red = recording
                micBtn.innerHTML = '🎙️';
            }

            // Handle recognition result
            this.recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;

                // Append to existing value or replace
                if (inputEl.tagName === 'TEXTAREA') {
                    // For textarea, append with space
                    inputEl.value = inputEl.value ? inputEl.value + ' ' + transcript : transcript;
                } else {
                    // For text input, append with space
                    inputEl.value = inputEl.value ? inputEl.value + ' ' + transcript : transcript;
                }

                // Trigger change event
                inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                inputEl.dispatchEvent(new Event('change', { bubbles: true }));

                // Reset mic button
                if (micBtn) {
                    micBtn.style.background = '';
                    micBtn.innerHTML = '🎙️';
                }

                // Trigger completion event (e.g., TTS feedback)
                this.handleFieldComplete(fieldId, transcript);

                // Handle auto-submit
                const fieldDef = this.def.questions.find(f => f.name === fieldId);
                this.handleAutoSubmit(fieldDef);
            };

            // Handle errors
            this.recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (micBtn) {
                    micBtn.style.background = '';
                    micBtn.innerHTML = '🎙️';
                }

                if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                    Utils.alert('Izin mikrofon ditolak. Silakan aktifkan di pengaturan browser.');
                } else if (event.error === 'no-speech') {
                    Utils.alert('Tidak ada suara terdeteksi. Silakan coba lagi.');
                }
            };

            // Handle end of recognition
            this.recognition.onend = () => {
                if (micBtn) {
                    micBtn.style.background = '';
                    micBtn.innerHTML = '🎙️';
                }
            };

            // Start recognition
            try {
                this.recognition.start();
            } catch (e) {
                console.error('Failed to start recognition:', e);
                if (micBtn) {
                    micBtn.style.background = '';
                    micBtn.innerHTML = '🎙️';
                }
            }
        },

        // ===== GENERIC AUTO-TRIGGER SYSTEM =====
        triggerAutoStart(q) {
            // Skip if field already has value (except for note/display types)
            const hasVal = this.data[q.name];
            if (hasVal && q.type !== 'note' && !q.speech_label && !q.voice_label) return;

            // Map field types to their auto-start actions
            if (q.type === 'qrcode_scan') {
                // QR Scanner: Open scanner modal
                this.openScannerModal(q.name);
            } else if (q.type === 'gps') {
                // GPS: Get location
                if (!this.data[q.name]) this.gps(q.name);
            } else if ((q.type === 'text' || q.type === 'textarea') && (q.speech_input || q.voice_input)) {
                // Voice Input: Auto-start mic (with delay to ensure render complete)
                setTimeout(() => this.listen(q.name), 500);
            } else if (q.speech_label || q.voice_label) {
                // TTS: Auto-read label (works for any field type including note)
                setTimeout(() => this.speak(q.label), 300);
            }
        },

        handleAutoSubmit(fieldDef) {
            if (!fieldDef) return;

            // Check for auto_submit property (support both variants)
            if (fieldDef.auto_submit || fieldDef.autosubmit) {
                // Small delay to ensure all events complete
                setTimeout(() => {
                    if (this.validate() && this.onSubmit) {
                        this.onSubmit({ ...this.data });
                    }
                }, 300);
            }
        },

        handleFieldComplete(fieldName, value) {
            const fieldDef = this.def.questions.find(f => f.name === fieldName);
            if (!fieldDef || !fieldDef.on_complete) return;

            const event = fieldDef.on_complete;

            // Handle speak action
            if (event.speak) {
                let text = event.speak;

                // Variable substitution
                text = text.replace(/\$value/g, value || '');
                text = text.replace(/\$label/g, fieldDef.label || '');
                text = text.replace(/\$field/g, fieldName || '');

                // Delay slightly to ensure UI has updated
                setTimeout(() => this.speak(text), 200);
            }

            // Future: Handle other event actions (navigate, action, etc.)
        }

    };

    // Expose to global scope
    window.FormEngine = FormEngine;
</script>
