<script>
const SasaranViews = {
    Main: () => `
        <div class="header">
            <h1>Madrasah Sasaran</h1>
            <button class="logout-btn" onclick="App.router('dashboard')">Kembali</button>
        </div>
        <div class="content">
            <div class="card" style="margin-bottom:20px;">
                <h3 style="margin-top:0;">Cari Madrasah</h3>
                <p style="font-size:0.9em; color:#666;">
                    Pencarian otomatis difilter berdasarkan Kabupaten Anda: <b>${App.state.user['Kabupaten'] || '-'}</b>. 
                    Anda bisa mengetik NSM/NPSN atau nama madrasah.
                </p>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="search-keyword" class="form-control" placeholder="Ketik NSM atau Nama..." onkeypress="if(event.key==='Enter') SasaranManager.search()">
                    <button class="btn btn-primary" onclick="SasaranManager.search()">Cari</button>
                </div>
                
                <div id="search-results" style="margin-top:15px;"></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0;">Daftar Terpilih</h3>
                <p style="font-size:0.9em; color:#666; margin-bottom:10px;">Daftar madrasah yang akan menjadi binaan Anda. Jangan lupa klik Simpan di bawah.</p>
                <div id="selected-list" style="margin-bottom:15px; border:1px solid #ddd; min-height:50px; border-radius:5px; padding:10px; background:#fdfdfd;">
                    <!-- Terpilih akan muncul di sini -->
                </div>
                <button class="btn btn-primary" style="width:100%; padding:12px; font-size:1.1em;" onclick="SasaranManager.save()">Simpan Daftar Sasaran</button>
            </div>
        </div>
    `,

    SearchResultItem: (item) => `
        <div class="card" style="padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; border-left:3px solid var(--color-primary);">
            <div>
                <strong style="display:block;">${item.nama}</strong>
                <small style="color:#666;">NSM: ${item.nsm} | Jenjang: ${item.jenjang}</small>
            </div>
            <button class="btn" style="padding:6px 12px; background:#28a745;" onclick="SasaranManager.addSelected('${item.nsm}', '${item.nama.replace(/'/g, "\\'")}')">Tambah</button>
        </div>
    `,

    SelectedItem: (nsm, nama) => `
        <div class="history-item" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; padding:8px 10px; background:#fff; border:1px solid #eee; border-radius:4px;">
            <div>
                <b>${nama}</b> <br> <small style="color:#888;">NSM: ${nsm}</small>
            </div>
            <button style="border:none; background:transparent; color:#dc3545; cursor:pointer; font-size:1.2em;" onclick="SasaranManager.removeSelected('${nsm}')">✖</button>
        </div>
    `
};

const SasaranManager = {
    selected: [], // { nsm, nama }

    init() {
        this.selected = App.state.madrasahSasaran || [];
        this.renderSelected();
        // Load initial data dari profil (existing sasaran)
        if (this.selected.length === 0 && App.state.user && App.state.user['NIP']) {
            this.loadExisting();
        }
    },

    loadExisting() {
        App.loading(true, 'Memuat data sasaran saat ini...');
        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            this.selected = res || [];
            App.state.madrasahSasaran = this.selected;
            this.renderSelected();
        }).getSasaran(App.state.user['NIP']);
    },

    search() {
        const keyword = document.getElementById('search-keyword').value;
        const kabupaten = App.state.user['Kabupaten'] || '';

        App.loading(true, 'Mencari madrasah...');
        document.getElementById('search-results').innerHTML = '';

        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            if (res && res.length > 0) {
                let html = res.map(item => SasaranViews.SearchResultItem(item)).join('');
                document.getElementById('search-results').innerHTML = html;
            } else {
                document.getElementById('search-results').innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Tidak ditemukan data yang cocok.</p>';
            }
        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'System Error');
        }).searchMadrasah(kabupaten, keyword);
    },

    addSelected(nsm, nama) {
        if (this.selected.find(s => s.nsm === nsm)) {
            return App.alert('Madrasah ini sudah ada di daftar terpilih.', 'Info');
        }
        this.selected.push({ nsm: nsm, nama: nama });
        this.renderSelected();
    },

    removeSelected(nsm) {
        this.selected = this.selected.filter(s => s.nsm !== nsm);
        this.renderSelected();
    },

    renderSelected() {
        const container = document.getElementById('selected-list');
        if (this.selected.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; margin:0;">Belum ada madrasah terpilih.</p>';
        } else {
            container.innerHTML = this.selected.map(s => SasaranViews.SelectedItem(s.nsm, s.nama)).join('');
        }
    },

    save() {
        App.loading(true, 'Menyimpan daftar sasaran...');
        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            if (res.success) {
                App.alert('Daftar madrasah sasaran berhasil disimpan.', 'Sukses');
                App.state.madrasahSasaran = this.selected;
                App.router('dashboard');
            } else {
                App.alert(res.message, 'Gagal');
            }
        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'System Error');
        }).saveSasaranList(App.state.user['NIP'], this.selected);
    }
};
</script>
