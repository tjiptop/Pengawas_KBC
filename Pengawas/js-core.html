<script>
// ============================================================
// CORE APP — State, Router, Alert Modal, Dark Mode
// ============================================================

// Lifecycle cleanup registry — fungsi-fungsi ini dipanggil saat router berpindah halaman
// Mencegah memory leak dari event listener / interval yang tersisa
const _pageCleanups = [];

const App = {
  state: {
    user: null,
    kamad: null,           // Session kamad (nsm, madrasah_name, dll.)
    kamadForms: [],        // Cache daftar form kamad
    view: 'login',
    madrasahSasaran: [],
    submissions: [],
    darkMode: localStorage.getItem('pengawas_dark') === 'true'
  },

  init() {
    // Terapkan dark mode dari preferensi tersimpan
    this.applyDarkMode(this.state.darkMode);

    // Tampilkan label versi aktif secara dinamis di pojok kanan bawah
    const appVersion = typeof window.SERVER_PARAMS !== 'undefined' && window.SERVER_PARAMS.app_version ? window.SERVER_PARAMS.app_version : 'v.2.5.0';
    const badgeEl = document.getElementById('version-badge');
    if (badgeEl) {
      badgeEl.textContent = appVersion;
    }

    // Cek apakah ada kamad_setup_token dari server (Google Apps Script iframe safe)
    let kamadSetupToken = typeof window.SERVER_PARAMS !== 'undefined' && window.SERVER_PARAMS.kamad_setup_token ? window.SERVER_PARAMS.kamad_setup_token : null;
    if (!kamadSetupToken) {
      // Fallback tetap baca URL jika di-host di luar iframe
      const urlParams = new URLSearchParams(window.location.search);
      kamadSetupToken = urlParams.get('kamad_setup_token');
    }
    
    // Normalisasi defensif: cegah token bernilai string "null", "undefined", atau kosong
    if (kamadSetupToken === 'null' || kamadSetupToken === 'undefined' || kamadSetupToken === '') {
      kamadSetupToken = null;
    }
    
    if (kamadSetupToken) {
      // Validasi format token minimal sebelum dikirim ke server
      if (!/^[a-zA-Z0-9_\-]{10,}$/.test(kamadSetupToken)) {
        this.alert('Link setup tidak valid atau sudah kedaluwarsa. Minta link baru dari Pengawas Anda.', 'Link Tidak Valid');
        this.router('login');
        return;
      }
      // Render halaman setup password kamad
      document.getElementById('app').innerHTML = `
        <div class="kamad-auth-wrap">
          <div class="kamad-auth-card" style="text-align:center;">
            <div style="font-size:2.5rem;margin-bottom:12px;">🔑</div>
            <p style="color:var(--color-text-secondary);margin:0;">Memverifikasi link...</p>
          </div>
        </div>`;
      KamadAuth.handleSetupToken(kamadSetupToken);
      return;
    }

    // Cek session pengawas tersimpan LEBIH DAHULU
    // Pengawas adalah user utama; kamad_session yang tersisa dari mode "view-as"
    // tidak boleh menggantikan sesi Pengawas yang masih aktif.
    const storedUser = localStorage.getItem('pengawas_user');
    if (storedUser) {
      try {
        this.state.user = JSON.parse(storedUser);
        // Hapus sisa kamad_session dari sesi "view-as" sebelumnya agar tidak bocor
        localStorage.removeItem('kamad_session');
        this.router('dashboard');
        return;
      } catch (e) {
        localStorage.removeItem('pengawas_user');
      }
    }

    // Cek session kamad tersimpan (hanya jika tidak ada sesi Pengawas aktif)
    const storedKamad = localStorage.getItem('kamad_session');
    if (storedKamad) {
      try {
        this.state.kamad = JSON.parse(storedKamad);
        this.router('kamad-dashboard');
        return;
      } catch (e) { localStorage.removeItem('kamad_session'); }
    }

    this.router('login');
  },

  router(view, params = {}) {
    // Jalankan cleanup halaman sebelumnya (hapus event listener, interval, dll.)
    while (_pageCleanups.length) {
      try { _pageCleanups.pop()(); } catch(e) { /* silent */ }
    }
    this.state.view = view;
    const el = document.getElementById('app');
    window.scrollTo(0, 0);

    if (view === 'login') {
      el.innerHTML = AuthViews.Login();
    } else if (view === 'set_password') {
      el.innerHTML = AuthViews.SetPassword(params.nip);
    } else if (view === 'profile') {
      try {
        el.innerHTML = ProfileViews.Form(this.state.user || {});
        setTimeout(() => ProfileManager.updateKabupaten(), 0);
      } catch(e) {
        el.innerHTML = '<div class="content"><div class="card"><p style="color:red;font-weight:bold;">Terjadi kesalahan saat memuat form profil:</p><pre style="background:#f4f4f4;padding:10px;border-radius:5px;overflow:auto;font-size:12px;">' + e.message + '\n' + e.stack + '</pre><button class="btn" onclick="App.router(\'dashboard\')" style="margin-top:15px;">Kembali</button></div></div>';
        console.error('Profile view error:', e);
      }
    } else if (view === 'sasaran') {
      el.innerHTML = SasaranViews.Main();
      SasaranManager.init();
    } else if (view === 'forms') {
      el.innerHTML = FormsViews.Main();
      // Load sasaran kalau belum ada di state
      const afterSasaran = () => {
        FormsManager.init();
      };
      if (!this.state.madrasahSasaran || this.state.madrasahSasaran.length === 0) {
        google.script.run
          .withSuccessHandler(res => {
            this.state.madrasahSasaran = res || [];
            afterSasaran();
          })
          .withFailureHandler(() => afterSasaran())
          .getSasaran(this.state.user['NIP']);
      } else {
        afterSasaran();
      }
    } else if (view === 'dashboard') {
      if (!this.state.user || !this.state.user['Nama']) {
        this.router('profile');
        return;
      }
      el.innerHTML = DashboardViews.Main(this.state.user);
      DashboardManager.init();

    // ---- KAMAD ROUTES ----
    } else if (view === 'kamad-login') {
      el.innerHTML = KamadAuth.views.login();
    } else if (view === 'kamad-dashboard') {
      // Simpan session kamad HANYA jika Pengawas TIDAK sedang view-as.
      // Jika isSupervisorViewAs=true, berarti Pengawas sedang mengintip tampilan Kamad
      // dan session-nya TIDAK boleh disimpan permanen ke localStorage.
      if (this.state.kamad && !this.state.isSupervisorViewAs) {
        localStorage.setItem('kamad_session', JSON.stringify(this.state.kamad));
      }
      KamadDashboard.init();
    } else if (view === 'kamad-forms') {
      KamadForms.init();
    } else if (view === 'kamad-history') {
      KamadForms.init();
      setTimeout(() => KamadForms.switchTab('history'), 100);
    }
  },

  loading(show, text = 'Loading...') {
    const el = document.getElementById('loading');
    document.getElementById('loading-text').innerText = text;
    el.style.display = show ? 'flex' : 'none';
  },

  // === MODAL ALERT (menggantikan browser alert()) ===
  alert(msg, title = 'Info', onClose) {
    // Hapus modal lama jika ada
    const old = document.getElementById('app-alert-modal');
    if (old) old.remove();

    const modal = document.createElement('div');
    modal.id = 'app-alert-modal';
    modal.style.cssText = `
      position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.5);animation:fadeIn 0.15s ease;
    `;

    const icons = { 'Info': 'ℹ️', 'Berhasil': '✅', 'Gagal': '❌', 'Error': '⚠️', 'Peringatan': '⚠️' };
    const icon = icons[title] || 'ℹ️';

    modal.innerHTML = `
      <div style="
        background:var(--color-bg);border-radius:16px;padding:28px 24px;
        max-width:340px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);
        animation:slideUp 0.2s ease;
      ">
        <div style="text-align:center;margin-bottom:16px;">
          <div style="font-size:2.5em;margin-bottom:8px;">${icon}</div>
          <h3 style="margin:0 0 10px;font-size:1.1em;color:var(--color-text);">${title}</h3>
          <p style="margin:0;font-size:0.9em;color:#666;line-height:1.5;">${msg}</p>
        </div>
        <button id="app-alert-ok" class="btn btn-primary" style="width:100%;padding:12px;font-size:0.95em;">OK</button>
      </div>`;

    document.body.appendChild(modal);

    const close = () => {
      modal.remove();
      if (typeof onClose === 'function') onClose();
    };

    document.getElementById('app-alert-ok').onclick = close;
    modal.onclick = (e) => { if (e.target === modal) close(); };
  },

  // === DARK MODE ===
  toggleDarkMode() {
    this.state.darkMode = !this.state.darkMode;
    localStorage.setItem('pengawas_dark', this.state.darkMode);
    this.applyDarkMode(this.state.darkMode);
  },

  applyDarkMode(dark) {
    if (dark) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    // Update icon jika toggle button sudah ada di DOM
    const btn = document.getElementById('dark-mode-toggle');
    if (btn) btn.textContent = dark ? '☀️' : '🌙';
  },

  logout() {
    localStorage.removeItem('pengawas_user');
    this.state.user = null;
    this.state.madrasahSasaran = [];
    this.state.submissions = [];
    this.router('login');
  },

  kamadLogout() {
    localStorage.removeItem('kamad_session');
    this.state.kamad = null;
    this.router('login');
  },

  // ============================================================
  // GLOBAL TOAST NOTIFICATION
  // Menggantikan showToast() yang duplikat di berbagai file.
  // Gunakan: App.toast('Pesan', 'success' | 'error' | 'warning' | 'info')
  // ============================================================
  toast(msg, type = 'info', durationMs = 2500) {
    const colors = {
      info:    'rgba(30,30,30,0.88)',
      success: '#28a745',
      error:   '#dc3545',
      warning: '#f0ad00'
    };
    // Pastikan style animasi hanya ditambahkan sekali
    if (!document.getElementById('app-toast-style')) {
      const style = document.createElement('style');
      style.id = 'app-toast-style';
      style.textContent = `
        @keyframes _toastIn  { from { opacity:0; transform:translate(-50%,10px) } to { opacity:1; transform:translate(-50%,0) } }
        @keyframes _toastOut { from { opacity:1; transform:translate(-50%,0) } to { opacity:0; transform:translate(-50%,-8px) } }
        .app-toast { animation: _toastIn 0.22s ease forwards; }
        .app-toast.hiding { animation: _toastOut 0.22s ease forwards; }
      `;
      document.head.appendChild(style);
    }
    const toast = document.createElement('div');
    toast.className = 'app-toast';
    toast.style.cssText = `
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
      background:${colors[type] || colors.info};color:white;
      padding:10px 22px;border-radius:30px;font-size:0.82rem;
      font-weight:600;z-index:10001;box-shadow:0 4px 16px rgba(0,0,0,0.28);
      pointer-events:none;white-space:nowrap;font-family:inherit;
    `;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('hiding');
      setTimeout(() => toast.remove(), 220);
    }, durationMs);
  },

  // ============================================================
  // RETRY WRAPPER untuk google.script.run
  // Otomatis coba ulang jika koneksi gagal (exponential backoff).
  // Gunakan: App.runWithRetry('namaFungsiGAS', [arg1, arg2], onSuccess, onError)
  // ============================================================
  runWithRetry(fnName, args = [], onSuccess, onError, maxRetry = 2) {
    let attempt = 0;
    const run = () => {
      attempt++;
      let runner = google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(err => {
          if (attempt < maxRetry) {
            const delay = 1200 * attempt; // 1.2s, 2.4s, ...
            console.warn(`[Retry ${attempt}/${maxRetry}] ${fnName} gagal, coba lagi dalam ${delay}ms...`);
            setTimeout(run, delay);
          } else {
            if (typeof onError === 'function') onError(err);
          }
        });
      runner[fnName](...args);
    };
    run();
  }
};

// Tambahkan style animasi modal ke head
const _modalStyle = document.createElement('style');
_modalStyle.textContent = `
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { transform:translateY(20px);opacity:0 } to { transform:translateY(0);opacity:1 } }
  .form-tab {
    padding: 10px 18px; background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; font-size: 0.9em; font-weight: 600; color: #999; transition: all 0.2s;
  }
  .form-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
  .form-tab:hover { color: var(--color-text); }
  .form-card { transition: transform 0.15s, box-shadow 0.15s; }
  .form-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
`;
document.head.appendChild(_modalStyle);

// Initialize App on Load
window.addEventListener('load', () => {
  App.init();
});
</script>
