<script>
const SasaranViews = {
    Main: () => `
        <div class="header">
            <div class="header-title-wrap">
                <div class="header-page-icon">🏫</div>
                <h1>Madrasah Sasaran</h1>
            </div>
            <button class="back-btn" onclick="App.router('dashboard')"><span style="font-size:0.9em;">‹</span> Kembali</button>
        </div>
        <div class="content" style="padding-bottom: 80px;">
            <div class="card">
                <p style="font-size:0.9em; color:#666; margin-top:0;">
                    Menampilkan madrasah di <b>${App.state.user['Kabupaten'] || '-'}</b> 
                    berdasarkan jenjang: <b>${App.state.user['Jenjang'] || '-'}</b>.
                </p>
                <div style="margin-top:15px; position: sticky; top: 0; background: white; padding-bottom: 10px; z-index: 10;">
                    <input type="text" id="search-sasaran" class="form-control" placeholder="🔍 Ketik NSM, NPSN, atau Nama Madrasah..." onkeyup="SasaranManager.filterTree(this.value)">
                </div>
                
                <div id="tree-container" style="margin-top:10px; border: 1px solid #eee; border-radius: 5px; padding: 10px; background: #fafafa;">
                    <p style="text-align:center; color:#999; padding:20px;">Memuat data madrasah...</p>
                </div>
            </div>
        </div>

        <div class="sasaran-footer">
            <div class="sasaran-footer-status">
                <span class="sasaran-footer-status-label">Status Pilihan</span>
                <h3 class="sasaran-footer-status-count">Terpilih: <span id="selected-count" style="color:var(--color-primary); font-weight: 900;">0</span></h3>
            </div>
            <button class="btn btn-primary sasaran-footer-btn" onclick="SasaranManager.save()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                Simpan Sasaran
            </button>
        </div>
    `,

    KecamatanGroup: (kecamatan, itemsHtml) => `
        <details class="kecamatan-group" style="margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; overflow: hidden; background: #fff;">
            <summary style="padding: 12px 15px; background: #f8f9fa; cursor: pointer; font-weight: bold; font-size: 1.05em; outline: none; display: flex; align-items: center; user-select: none;">
                <span style="flex-grow: 1;">📍 Kecamatan ${kecamatan}</span>
            </summary>
            <div style="padding: 5px 15px; background: #fff;">
                ${itemsHtml}
            </div>
        </details>
    `,

    JenjangGroup: (jenjang, itemsHtml) => `
        <details class="jenjang-group" style="margin-top: 5px; margin-bottom: 5px; border-left: 3px solid var(--color-primary); padding-left: 10px; margin-left: 5px;">
            <summary style="padding: 8px 10px; background: #f1f8ff; cursor: pointer; font-weight: bold; font-size: 0.95em; outline: none; display: flex; align-items: center; user-select: none; color: var(--color-primary); border-radius: 4px;">
                <span style="flex-grow: 1;">🏫 Tingkat ${jenjang}</span>
            </summary>
            <div style="padding: 0 5px;">
                ${itemsHtml}
            </div>
        </details>
    `,

    MadrasahItem: (item, isChecked) => `
        <label class="madrasah-item" style="display: flex; align-items: flex-start; padding: 10px 0; border-bottom: 1px dashed #eee; cursor: pointer;">
            <input type="checkbox" value="${item.nsm}" onchange="SasaranManager.toggleSelection(this, '${item.nsm}', '${item.nama.replace(/'/g, "\\'")}')" ${isChecked ? 'checked' : ''} style="margin-top: 4px; margin-right: 12px; transform: scale(1.3);">
            <div>
                <strong style="display:block; color: #333;">${item.nama}</strong>
                <small style="color:#666;">NSM: ${item.nsm} ${item.npsn ? `| NPSN: ${item.npsn}` : ''} | Jenjang: ${item.jenjang}</small>
            </div>
        </label>
    `
};

const SasaranManager = {
    allData: [],
    selectedData: [], // Array of {nsm, nama}

    init() {
        this.allData = [];
        this.selectedData = App.state.madrasahSasaran || [];
        this.loadExistingAndAll();
    },

    loadExistingAndAll() {
        const nip = App.state.user['NIP'];
        const kabupaten = App.state.user['Kabupaten'] || '';
        const jenjang = App.state.user['Jenjang'] || '';

        App.loading(true, 'Memuat data madrasah...');
        
        // Fetch existing sasaran first
        google.script.run.withSuccessHandler(resExisting => {
            this.selectedData = resExisting || [];
            App.state.madrasahSasaran = this.selectedData;
            
            // Then fetch all madrasah for tree
            google.script.run.withSuccessHandler(resAll => {
                App.loading(false);
                this.allData = resAll || [];
                this.renderTree('');
            }).withFailureHandler(err => {
                App.loading(false);
                App.alert(err.message, 'Gagal memuat list madrasah');
            }).getMadrasahForSasaran(kabupaten, jenjang, nip);

        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'Gagal memuat sasaran tersimpan');
        }).getSasaran(nip);
    },

    filterTree(keyword) {
        this.renderTree(keyword.toLowerCase().trim());
    },

    renderTree(filterKeyword) {
        const container = document.getElementById('tree-container');
        if (!this.allData || this.allData.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding: 20px;">Tidak ada data madrasah yang cocok dengan profil Anda (Kabupaten: '+App.state.user['Kabupaten']+', Jenjang: '+App.state.user['Jenjang']+').</p>';
            this.updateCount();
            return;
        }

        // Group by Kecamatan -> Jenjang
        let grouped = {};
        let totalRendered = 0;

        for (let item of this.allData) {
            if (filterKeyword) {
                let match = (item.nama && item.nama.toLowerCase().includes(filterKeyword)) ||
                            (item.nsm && String(item.nsm).includes(filterKeyword)) ||
                            (item.npsn && String(item.npsn).includes(filterKeyword));
                if (!match) continue;
            }

            let kec = item.kecamatan || 'Tanpa Kecamatan';
            let jenjang = item.jenjang ? item.jenjang.toUpperCase() : 'LAINNYA';

            if (!grouped[kec]) grouped[kec] = {};
            if (!grouped[kec][jenjang]) grouped[kec][jenjang] = [];
            
            grouped[kec][jenjang].push(item);
            totalRendered++;
        }

        if (totalRendered === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding: 20px;">Pencarian tidak ditemukan.</p>';
            return;
        }

        let html = '';
        const forceOpen = filterKeyword.length > 0; // If searching, open all details

        // Sort kecamatan alphabetically
        let sortedKec = Object.keys(grouped).sort();

        for (let kec of sortedKec) {
            let jenjangGroupsHtml = '';
            
            // Sort jenjang alphabetically
            let sortedJenjang = Object.keys(grouped[kec]).sort();
            
            for (let jenjang of sortedJenjang) {
                let itemsHtml = grouped[kec][jenjang].map(item => {
                    let isChecked = this.selectedData.some(s => s.nsm == item.nsm);
                    return SasaranViews.MadrasahItem(item, isChecked);
                }).join('');
                
                let jHtml = SasaranViews.JenjangGroup(jenjang, itemsHtml);
                if (forceOpen) jHtml = jHtml.replace('<details ', '<details open ');
                jenjangGroupsHtml += jHtml;
            }
            
            let groupHtml = SasaranViews.KecamatanGroup(kec, jenjangGroupsHtml);
            if (forceOpen) {
                groupHtml = groupHtml.replace('<details ', '<details open ');
            }
            html += groupHtml;
        }

        container.innerHTML = html;
        this.updateCount();
    },

    toggleSelection(checkboxElem, nsm, nama) {
        if (checkboxElem.checked) {
            if (!this.selectedData.some(s => s.nsm == nsm)) {
                this.selectedData.push({ nsm: nsm, nama: nama });
            }
        } else {
            this.selectedData = this.selectedData.filter(s => s.nsm != nsm);
        }
        this.updateCount();
    },

    updateCount() {
        const countSpan = document.getElementById('selected-count');
        if (countSpan) {
            countSpan.innerText = this.selectedData.length;
        }
    },

    save() {
        App.loading(true, 'Menyimpan daftar sasaran...');
        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            if (res.success) {
                App.alert('Daftar madrasah sasaran berhasil disimpan.', 'Sukses');
                App.state.madrasahSasaran = this.selectedData;
                App.router('dashboard');
            } else {
                App.alert(res.message, 'Gagal');
            }
        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'System Error');
        }).saveSasaranList(App.state.user['NIP'], this.selectedData);
    }
};
</script>
