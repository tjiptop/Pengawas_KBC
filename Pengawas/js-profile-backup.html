window.ProfileManager = {
    updateKabupaten() {
        const provEl = document.getElementById('prof-provinsi');
        const kabEl = document.getElementById('prof-kabupaten');
        if (!provEl || !kabEl) return;
        const selectedProv = provEl.value;
        
        const rawSelected = kabEl.getAttribute('data-selected') || '';
        const textarea = document.createElement('textarea');
        textarea.innerHTML = rawSelected;
        const previousKab = textarea.value;

        kabEl.innerHTML = '<option value="">Pilih Kabupaten...</option>';
        if (selectedProv && DataWilayah[selectedProv]) {
            DataWilayah[selectedProv].forEach(kab => {
                let displayKab = kab.replace(/^(Kab\.|Kabupaten)\s+/i, '');
                let selected = (displayKab === previousKab || kab === previousKab) ? 'selected' : '';
                kabEl.innerHTML += `<option value="${displayKab}" ${selected}>${displayKab}</option>`;
            });
        }
    },

    previewFoto(input) {
        if (input.files && input.files[0]) {
            let file = input.files[0];
            let reader = new FileReader();
            
            reader.onload = function(e) {
                document.getElementById('preview-foto').src = e.target.result;
                document.getElementById('preview-foto').style.display = 'block';
                document.getElementById('prof-foto-base64').value = e.target.result;
                document.getElementById('prof-foto-filename').value = file.name;
            }
            reader.readAsDataURL(file);
        }
    },

    save() {
        
        const jenjangBoxes = document.querySelectorAll('input[name="prof-jenjang"]:checked');
        const jenjang = Array.from(jenjangBoxes).map(cb => cb.value).join(', ');

        if (!jenjang) return App.alert('Pilih minimal satu jenjang.', 'Validasi');

        const nip = document.getElementById('prof-nip').value;
        const payload = {
            'NIP': nip,
            'Nama': document.getElementById('prof-nama').value,
            'Tempat Lahir': document.getElementById('prof-tempat-lahir').value,
            'Tanggal Lahir': document.getElementById('prof-tgl-lahir').value,
            'Golongan': document.getElementById('prof-golongan').value,
            'Provinsi': document.getElementById('prof-provinsi').value,
            'Kabupaten': document.getElementById('prof-kabupaten').value,
            'Jenjang': jenjang,
            'WA': document.getElementById('prof-wa').value,
            'Email': document.getElementById('prof-email').value,
            'Alamat': document.getElementById('prof-alamat').value
        };

        const fotoBase64 = document.getElementById('prof-foto-base64').value;
        const fotoFilename = document.getElementById('prof-foto-filename').value;

        App.loading(true, 'Menyimpan profil...');

        
        if (fotoBase64) {
            App.loading(true, 'Mengunggah foto...');
            google.script.run.withSuccessHandler(res => {
                if (res.success) {
                    payload['Foto URL'] = res.data.url;
                    this.saveData(payload);
                } else {
                    App.loading(false);
                    App.alert('Gagal unggah foto: ' + (res.error || res.message), 'Error');
                }
            }).withFailureHandler(err => {
                App.loading(false);
                App.alert(err.message, 'System Error');
            }).uploadPhoto(nip, fotoBase64, fotoFilename);
        } else {
            this.saveData(payload);
        }
    },

    saveData(payload) {
        App.loading(true, 'Menyimpan data...');
        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            if (res.success) {
                App.alert('Profil berhasil diperbarui.', 'Berhasil');
                const updatedProfile = res.data || payload;
                App.state.user = updatedProfile;
                localStorage.setItem('pengawas_user', JSON.stringify(updatedProfile));
                App.router('dashboard');
            } else {
                App.alert(res.error || res.message, 'Gagal');
            }
        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'System Error');
        }).saveProfile(payload);
    }
};


window.addEventListener('load', () => {
    
    setTimeout(() => {
        if(document.getElementById('prof-provinsi')) {
            ProfileManager.updateKabupaten();
        }
    }, 100);
});
console.log("End of js-profile.html script tag!");
</script>
