<script>
// ============================================================
// FORMS VIEW & MANAGER
// Halaman daftar dan pengisian form instrumen pengawasan
// ============================================================

const FormsViews = {
  Main: () => `
    <div class="header">
      <div class="header-title-wrap">
        <div class="header-page-icon">📋</div>
        <h1>Instrumen Pengawasan</h1>
      </div>
      <button class="back-btn" onclick="App.router('dashboard')"><span style="font-size:0.9em;">‹</span> Kembali</button>
    </div>
    <div class="content">
      <!-- Tab: Daftar Form / Riwayat -->
      <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--color-border);">
        <button id="tab-forms" class="form-tab active" onclick="FormsManager.switchTab('forms')">📋 Form Tersedia</button>
        <button id="tab-history" class="form-tab" onclick="FormsManager.switchTab('history')">🕐 Riwayat Isi Instrumen</button>
      </div>

      <!-- Banner Madrasah Sasaran Terpilih -->
      <div id="selected-madrasah-banner" style="display:none; margin-bottom:15px;"></div>

      <!-- Panel: Form tersedia -->
      <div id="panel-forms">
        <div id="forms-list-container">
          <div style="text-align:center;padding:30px;color:#999;">Memuat daftar form...</div>
        </div>
      </div>

      <!-- Panel: Riwayat -->
      <div id="panel-history" style="display:none;">
        <div id="history-list-container">
          <div style="text-align:center;padding:30px;color:#999;">Memuat riwayat...</div>
        </div>
      </div>

      <!-- Panel: Form renderer (saat form sedang diisi) -->
      <div id="panel-form-fill" style="display:none;">
        <div id="form-fill-container"></div>
      </div>
    </div>
  `
};

const FormsManager = {
  state: {
    activeTab: 'forms',
    forms: [],
    history: [],
    currentForm: null,
    selectedMadrasah: null
  },

  init() {
    this.updateSelectedMadrasahBanner();
    this.loadForms();
    this.loadHistory();
  },

  updateSelectedMadrasahBanner() {
    const banner = document.getElementById('selected-madrasah-banner');
    if (!banner) return;
    
    const madrasah = this.state.selectedMadrasah;
    if (madrasah) {
      banner.style.display = 'block';
      banner.innerHTML = `
        <div class="card" style="padding: 10px 15px; background: rgba(26,115,232,0.08); border-left: 4px solid var(--color-primary); display: flex; justify-content: space-between; align-items: center; border-radius: 8px; font-size: 0.9em; margin-bottom: 5px;">
          <span style="color:var(--color-text);">Mengisi instrumen untuk: <strong>${madrasah.nama}</strong> <small style="color:var(--color-text-secondary); margin-left: 5px;">(NSM: ${madrasah.nsm})</small></span>
          <button onclick="FormsManager.clearSelectedMadrasah()" style="background: none; border: none; color: var(--color-primary); cursor: pointer; font-weight: bold; font-size: 0.85em; padding: 2px 6px;">Ganti</button>
        </div>
      `;
    } else {
      banner.style.display = 'none';
      banner.innerHTML = '';
    }
  },

  clearSelectedMadrasah() {
    this.state.selectedMadrasah = null;
    this.updateSelectedMadrasahBanner();
  },

  switchTab(tab) {
    this.state.activeTab = tab;
    document.getElementById('panel-forms').style.display = tab === 'forms' ? '' : 'none';
    document.getElementById('panel-history').style.display = tab === 'history' ? '' : 'none';
    document.getElementById('panel-form-fill').style.display = 'none';

    document.getElementById('tab-forms').classList.toggle('active', tab === 'forms');
    document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  },

  loadForms() {
    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          this.state.forms = res.data || [];
          this.renderFormsList();
          if (this.pendingFormId) {
            const fid = this.pendingFormId;
            this.pendingFormId = null;
            this.startForm(fid);
          }
        } else {
          document.getElementById('forms-list-container').innerHTML =
            `<p style="color:#c0392b;text-align:center;">Gagal memuat form: ${res.error}</p>`;
        }
      })
      .withFailureHandler(err => {
        document.getElementById('forms-list-container').innerHTML =
          `<p style="color:#c0392b;text-align:center;">Error: ${err.message}</p>`;
      })
      .apiGetAvailableForms();
  },

  renderFormsList() {
    const container = document.getElementById('forms-list-container');
    const forms = this.state.forms;

    if (!forms || forms.length === 0) {
      container.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:#999;">
          <div style="font-size:3em;margin-bottom:10px;">📭</div>
          <p>Belum ada form instrumen yang tersedia.</p>
        </div>`;
      return;
    }

    // Kelompokkan per group
    const groups = {};
    forms.forEach(f => {
      const g = f.group || 'Lainnya';
      if (!groups[g]) groups[g] = [];
      groups[g].push(f);
    });

    let html = '';
    for (const groupName in groups) {
      html += `<h4 style="color:var(--color-primary);margin:20px 0 10px;font-size:0.9em;text-transform:uppercase;letter-spacing:1px;">${groupName}</h4>`;
      groups[groupName].forEach(form => {
        html += `
          <div class="card form-card" onclick="FormsManager.startForm('${form.id}')" style="cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:15px;padding:16px 18px;">
            <div style="font-size:2em;min-width:40px;text-align:center;">${form.icon || '📋'}</div>
            <div style="flex:1;">
              <strong style="display:block;font-size:0.95em;margin-bottom:3px;">${form.title}</strong>
              ${form.description ? `<small style="color:#888;">${form.description}</small>` : ''}
            </div>
            <div style="color:var(--color-primary);font-size:1.2em;">›</div>
          </div>`;
      });
    }

    container.innerHTML = html;
  },

  loadHistory() {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) {
          this.state.history = res.data || [];
          this.renderHistory();
        } else {
          const container = document.getElementById('history-list-container');
          if(container) container.innerHTML = `<div style="text-align:center;padding:30px;color:red;">Gagal memuat riwayat: ${res ? res.error : 'Unknown error'}</div>`;
        }
      })
      .withFailureHandler((error) => {
          const container = document.getElementById('history-list-container');
          if(container) container.innerHTML = `<div style="text-align:center;padding:30px;color:red;">Koneksi terputus: ${error.message || error}</div>`;
      })
      .apiGetSubmissionHistory(App.state.user['NIP'], null);
  },

  renderHistory() {
    const container = document.getElementById('history-list-container');
    const history = this.state.history;

    if (!history || history.length === 0) {
      container.innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:#999;">
          <div style="font-size:3em;margin-bottom:10px;">📂</div>
          <p>Belum ada riwayat pengisian form.</p>
        </div>`;
      return;
    }

    let html = history.map(item => {
      const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString('id-ID', {
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
      }) : '-';
      const formTitle = (this.state.forms.find(f => f.id === item.formId) || {}).title || item.formId;
      
      // Look up Madrasah Name from state
      const targetMadrasah = (App.state.madrasahSasaran || []).find(m => String(m.nsm).trim() === String(item.nsmMadrasah).trim());
      const madrasahName = targetMadrasah ? targetMadrasah.nama : (item.nsmMadrasah || '-');

      return `
        <div class="card" style="margin-bottom:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
          <div style="flex:1;">
            <strong style="display:block;font-size:0.9em;">${formTitle}</strong>
            <small style="color:#888;">${madrasahName} &bull; ${date}</small>
          </div>
          <span style="font-size:0.75em;padding:3px 8px;border-radius:10px;background:${item.status === 'final' ? '#d4edda' : '#fff3cd'};color:${item.status === 'final' ? '#155724' : '#856404'};">
            ${item.status || 'draft'}
          </span>
        </div>`;
    }).join('');

    container.innerHTML = html;
  },

  startForm(formId) {
    const formMeta = this.state.forms.find(f => f.id === formId) || {};
    
    if (formMeta.requiresMadrasah) {
      if (this.state.selectedMadrasah) {
        this.openForm(formId, this.state.selectedMadrasah);
        return;
      }

      // Pilih madrasah sasaran dahulu jika ada lebih dari 1
      const sasaran = App.state.madrasahSasaran || [];

      if (sasaran.length === 0) {
        App.alert('Anda belum memiliki madrasah sasaran KBC. Silakan kelola sasaran terlebih dahulu.', 'Perhatian');
        return;
      }

      if (sasaran.length === 1) {
        this.openForm(formId, sasaran[0]);
      } else {
        this.showMadrasahPicker(formId, sasaran);
      }
    } else {
      // Bypass selection for self-evaluation forms
      this.openForm(formId, { nsm: 'N/A', nama: 'Mandiri (Pengawas)' });
    }
  },

  showMadrasahPicker(formId, sasaranList) {
    const container = document.getElementById('forms-list-container');
    let options = sasaranList.map((m, i) => `
      <div class="card form-card" onclick="FormsManager.openForm('${formId}', ${JSON.stringify(m).replace(/'/g, '&apos;')})"
           style="cursor:pointer;margin-bottom:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
        <div style="width:28px;height:28px;background:var(--color-bg-hover);color:var(--color-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8em;font-weight:bold;">${i+1}</div>
        <div>
          <strong style="display:block;font-size:0.9em;">${m.nama}</strong>
          <small style="color:#888;">NSM: ${m.nsm}</small>
        </div>
      </div>`).join('');

    container.innerHTML = `
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
          <button onclick="FormsManager.renderFormsList()" style="background:none;border:none;cursor:pointer;font-size:1.1em;color:var(--color-primary);">← Kembali</button>
          <h3 style="margin:0;">Pilih Madrasah Sasaran KBC</h3>
        </div>
        ${options}
      </div>`;
  },

  openForm(formId, madrasah) {
    this.state.currentForm = formId;
    this.state.selectedMadrasah = madrasah;

    // Tampilkan panel form fill
    document.getElementById('panel-forms').style.display = 'none';
    document.getElementById('panel-history').style.display = 'none';
    document.getElementById('panel-form-fill').style.display = '';

    const container = document.getElementById('form-fill-container');
    container.innerHTML = `
      <!-- Back Button: Sleek, high-end floating link -->
      <div style="margin-bottom:16px;">
        <button onclick="FormsManager.cancelForm()" style="background:none;border:none;padding:0;color:var(--color-text-secondary);cursor:pointer;font-size:0.95em;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:color 0.2s;" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-text-secondary)'">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Kembali ke Daftar Form
        </button>
      </div>
      
      <!-- Integrated Form Container -->
      <div style="padding:16px 0;margin-bottom:24px;">
        
        <!-- Header Section -->
        <div style="border-bottom:1px solid var(--color-border-light);padding-bottom:20px;margin-bottom:28px;">
          <span style="display:inline-block;margin-bottom:8px;font-size:0.75rem;padding:3px 10px;border-radius:20px;background:rgba(26,115,232,0.12);color:var(--color-primary);font-weight:700;letter-spacing:0.5px;text-transform:uppercase;">
            ${madrasah.nama === 'Mandiri (Pengawas)' ? '🔒 Evaluasi Mandiri Pengawas' : '🏫 Madrasah Sasaran: ' + madrasah.nama}
          </span>
          <h1 style="margin:0;font-size:1.6rem;font-weight:800;color:var(--color-text);line-height:1.25;" id="form-fill-title">
            Memuat form...
          </h1>
        </div>
        
        <!-- Form Engine Mount Area -->
        <div id="form-engine-mount"></div>
        
        <!-- Action Button (integrated professionally inside form card) -->
        <div id="form-submit-area" class="form-submit-wrapper" style="display:none;">
          <button class="btn btn-primary form-submit-btn" onclick="FormsManager.triggerFormEngineSubmit()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Kirim Formulir
          </button>
        </div>
      </div>
    `;

    // Load form definition dari server
    App.loading(true, 'Memuat form...');
    google.script.run
      .withSuccessHandler(res => {
        App.loading(false);
        if (res.success) {
          this.renderFormEngine(res.data.yaml, res.data.id);
        } else {
          container.innerHTML = `<p style="color:#c0392b;">Gagal memuat form: ${res.error}</p>`;
        }
      })
      .withFailureHandler(err => {
        App.loading(false);
        container.innerHTML = `<p style="color:#c0392b;">Error: ${err.message}</p>`;
      })
      .apiGetFormDefinition(formId);
  },

  renderFormEngine(yamlStr, formId) {
    // Parse YAML dan render menggunakan FormEngine yang sudah tersedia
    try {
      if (typeof FormEngine === 'undefined') {
        throw new Error('FormEngine belum dimuat. Pastikan js-form-engine.html di-include.');
      }

      // Update title
      const parsed = jsyaml.load(yamlStr);
      const titleEl = document.getElementById('form-fill-title');
      if (titleEl) titleEl.textContent = parsed.title || formId;

      // Mount FormEngine ke container
      const mount = document.getElementById('form-engine-mount');
      if (typeof FormEngine !== 'undefined' && FormEngine.init) {
        FormEngine.init('form-engine-mount', yamlStr, {}, (data) => {
          FormsManager.submitForm(data);
        }, formId, this.state.selectedMadrasah);

        // Hiding of duplicate title and submit button are handled safely by high-performance CSS overrides in css.html
      } else {
        // Fallback: render manual sederhana
        this.renderFormManual(mount, parsed);
      }

      document.getElementById('form-submit-area').style.display = '';
    } catch (e) {
      document.getElementById('form-engine-mount').innerHTML =
        `<p style="color:#c0392b;">Gagal render form: ${e.message}</p>`;
      console.error('FormEngine error:', e);
    }
  },

  triggerFormEngineSubmit() {
    const form = document.getElementById('sf');
    if (form) {
      // Bypass HTML5 native validation (requestSubmit) which silently blocks hidden required inputs
      // We rely entirely on FormEngine.validate() which nicely displays Utils.alert() warnings
      form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
    } else {
      this.submitForm();
    }
  },


  // Fallback renderer manual jika FormEngine tidak tersedia
  renderFormManual(container, parsed) {
    const questions = parsed.questions || [];
    let html = '';

    questions.forEach(q => {
      if (q.type === 'header') {
        html += `<h${q.level || 3} style="color:var(--color-primary);margin:20px 0 8px;">${q.text || ''}</h${q.level || 3}>`;
      } else if (q.type === 'note') {
        html += `<p style="font-size:0.85em;color:#666;margin:2px 0;">${q.label || ''}</p>`;
      } else if (q.type === 'spacer') {
        html += `<div style="height:${q.height || '20px'};${q.line ? 'border-bottom:1px solid var(--color-border);' : ''}"></div>`;
      } else if (q.type === 'text_block') {
        html += `<div style="padding:12px;background:var(--color-bg-elevated);border-radius:8px;margin:10px 0;"><p style="margin:0;font-size:0.85em;color:var(--color-primary);font-weight:bold;">${q.content || ''}</p></div>`;
      } else if (q.type === 'text') {
        html += `<div class="form-group" style="margin-bottom:15px;">
          <label style="display:block;font-size:0.9em;font-weight:600;margin-bottom:5px;">${q.label || ''} ${q.required ? '<span style="color:#e74c3c;">*</span>' : ''}</label>
          <input type="text" name="${q.name}" ${q.readonly ? 'readonly' : ''} ${q.required ? 'required' : ''} class="form-input" style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-size:0.9em;box-sizing:border-box;background:var(--color-bg);">
        </div>`;
      } else if (q.type === 'textarea') {
        html += `<div class="form-group" style="margin-bottom:15px;">
          <label style="display:block;font-size:0.9em;font-weight:600;margin-bottom:5px;">${q.label || ''}</label>
          <textarea name="${q.name}" rows="${q.rows || 3}" placeholder="${q.placeholder || ''}" class="form-input" style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-size:0.9em;box-sizing:border-box;background:var(--color-bg);resize:vertical;"></textarea>
        </div>`;
      } else if (q.type === 'radio') {
        const opts = (q.options || []).map(opt =>
          `<label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;font-size:0.9em;">
            <input type="radio" name="${q.name}" value="${opt}"> ${opt}
          </label>`).join('');
        html += `<div class="form-group" style="margin-bottom:15px;">
          <label style="display:block;font-size:0.9em;font-weight:600;margin-bottom:8px;">${q.label || ''} ${q.required ? '<span style="color:#e74c3c;">*</span>' : ''}</label>
          <div style="padding-left:5px;">${opts}</div>
        </div>`;
      } else if (q.type === 'likert_scale') {
        const opts = (q.options || []).map((opt, i) =>
          `<label style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;text-align:center;">
            <input type="radio" name="${q.name}" value="${opt}">
            <span style="font-size:0.75em;color:#555;">${opt}</span>
          </label>`).join('');
        html += `<div class="form-group" style="margin-bottom:20px;padding:15px;background:var(--color-bg-elevated);border-radius:10px;">
          <p style="font-size:${q.label_size === 'medium' ? '0.9em' : '0.85em'};font-weight:500;margin:0 0 12px;line-height:1.5;">${q.label || ''}</p>
          <div style="display:flex;gap:5px;justify-content:space-between;">${opts}</div>
        </div>`;
      }
    });

    container.innerHTML = `<form id="dynamic-form" style="padding-bottom:20px;">${html}</form>`;
  },

  cancelForm() {
    this.state.currentForm = null;
    this.updateSelectedMadrasahBanner();
    this.switchTab('forms');
  },

  submitForm(customData) {
    const formId = this.state.currentForm;
    const madrasah = this.state.selectedMadrasah;

    if (!formId || !madrasah) return;

    // Kumpulkan data dari form
    let formData = {};
    
    if (customData) {
      formData = customData;
    } else {
      const form = document.getElementById('dynamic-form');
      if (form) {
        // Collect semua input/textarea
        const inputs = form.querySelectorAll('input:not([type=radio]):not([type=checkbox]), textarea, select');
        inputs.forEach(el => {
          if (el.name) formData[el.name] = el.value;
        });

        // Collect radio buttons (ambil yang checked)
        const radios = form.querySelectorAll('input[type=radio]:checked');
        radios.forEach(el => {
          if (el.name) formData[el.name] = el.value;
        });

        // Collect checkboxes
        const checkboxes = form.querySelectorAll('input[type=checkbox]');
        const checkboxGroups = {};
        checkboxes.forEach(el => {
          if (el.name) {
            if (!checkboxGroups[el.name]) checkboxGroups[el.name] = [];
            if (el.checked) checkboxGroups[el.name].push(el.value);
          }
        });
        Object.assign(formData, checkboxGroups);
      } else if (typeof FormEngine !== 'undefined' && FormEngine.data) {
        // Jika FormEngine tersedia, ambil data langsung dari data property
        formData = FormEngine.data;
      }
    }

    const payload = {
      nip: App.state.user['NIP'],
      formId: formId,
      nsmMadrasah: madrasah.nsm,
      data: formData
    };

    App.loading(true, 'Mengirim formulir...');
    google.script.run
      .withSuccessHandler(res => {
        App.loading(false);
        if (res.success) {
          App.alert(`Form berhasil dikirim! ID: ${res.data.submissionId}`, 'Berhasil');
          // Refresh history dan kembali ke list
          this.loadHistory();
          this.cancelForm();
          this.switchTab('history');
        } else {
          App.alert(res.error || 'Gagal mengirim form.', 'Gagal');
        }
      })
      .withFailureHandler(err => {
        App.loading(false);
        App.alert(err.message || 'Terjadi kesalahan sistem.', 'Error');
      })
      .apiSubmitForm(payload);
  }
};
</script>
