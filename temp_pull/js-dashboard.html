const DashboardManager = {
    init() {
        // Halaman depan dashboard dimuat instan tanpa query spreadsheet untuk performa optimal.
        App.loading(false);
    },

    viewMadrasahAsKamad(nsm, namaMadrasah) {
        App.state.isSupervisorViewAs = true;
        App.state.kamad = {
            nsm: nsm,
            madrasah_name: namaMadrasah
        };
        App.router('kamad-dashboard');
    },

    sendKamadLink(nsm, namaMadrasah) {
        const nip = App.state.user['NIP'];
        App.loading(true, `Membuat link setup untuk ${namaMadrasah}...`);
        
        google.script.run
            .withSuccessHandler(res => {
                App.loading(false);
                if (res.success) {
                    let linkUrl = res.data.setup_url;
                    if (linkUrl) {
                        const separator = linkUrl.indexOf('?') !== -1 ? '&' : '?';
                        linkUrl = `${linkUrl}${separator}cb=${Date.now()}`;
                    }
                    
                    const copyToClipboard = (text) => {
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            return navigator.clipboard.writeText(text);
                        } else {
                            const textArea = document.createElement("textarea");
                            textArea.value = text;
                            textArea.style.position = "fixed";
                            document.body.appendChild(textArea);
                            textArea.focus();
                            textArea.select();
                            let successful = false;
                            try {
                                successful = document.execCommand('copy');
                            } catch (err) { successful = false; }
                            document.body.removeChild(textArea);
                            return successful ? Promise.resolve() : Promise.reject();
                        }
                    };

                    copyToClipboard(linkUrl).then(() => {
                        App.toast('🔗 Link berhasil disalin!', 'success');
                    }).catch(() => {
                        App.alert(
                            `Gagal menyalin otomatis. Silakan salin link berikut secara manual:<br><br><input type="text" style="width:100%;font-size:0.9em;padding:8px;border-radius:4px;border:1px solid #ccc;" value="${linkUrl}" readonly onclick="this.select()">`,
                            'Gagal Salin Otomatis'
                        );
                    });
                } else {
                    App.alert(res.error || 'Gagal membuat link.', 'Gagal');
                }
            })
            .withFailureHandler(err => {
                App.loading(false);
                App.alert('Koneksi terputus: ' + (err.message || err), 'Error');
            })
            .generateKamadSetupLink(nsm, nip);
    },

    generateSK() {
        App.loading(true, 'Memproses SK... Mohon tunggu beberapa saat...');
        google.script.run.withSuccessHandler(res => {
            App.loading(false);
            if (res.success) {
                App.alert('SK berhasil di-generate! Klik OK untuk membuka PDF.', 'Berhasil', () => {
                    window.open(res.data.url, '_blank');
                });
            } else {
                App.alert(res.error || res.message || 'Gagal generate SK. Pastikan Anda memiliki madrasah sasaran KBC.', 'Gagal');
            }
        }).withFailureHandler(err => {
            App.loading(false);
            App.alert(err.message, 'System Error');
        }).generateSK(App.state.user['NIP']);
    }
};
