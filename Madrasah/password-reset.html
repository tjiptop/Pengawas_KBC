<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta charset="utf-8">
    <title>Reset Password - Madrasah Survey App</title>
    <?!= include('css'); ?>
</head>

<body>
    <div id="app" class="app-container">
        <!-- Content injected by JS -->
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top:1rem;font-weight:600;opacity:0.7">Loading...</p>
    </div>

    <script>
        /**
         * PASSWORD RESET PAGE
         * Standalone page for madrasah to reset their password via token link
         */

        // Token and Base URL injected from server-side template
        // The lines below will be replaced by actual values when rendered
        var RESET_TOKEN = '<?!= resetToken || "" ?>';
        var BASE_URL = '<?!= baseUrl || "" ?>';

        // Token and Google Script validation removed for production

        const ResetPage = {
            loading(show, message) {
                const el = document.getElementById('loading');
                if (el) {
                    el.style.display = show ? 'flex' : 'none';
                    const textEl = el.querySelector('p');
                    if (message && textEl) textEl.innerText = message;
                }
            },

            alert(msg, title = 'Notification') {
                return new Promise(resolve => {
                    const div = document.createElement('div');
                    div.className = 'modal-overlay';
                    div.style.zIndex = '10001';
                    div.innerHTML = `
            <div class="modal-content">
              <h3>${title}</h3>
              <p>${msg}</p>
              <div style="margin-top:20px">
                <button class="btn" onclick="this.closest('.modal-overlay').remove();">OK</button>
              </div>
            </div>
          `;
                    div.querySelector('button').onclick = () => { div.remove(); resolve(); };
                    document.body.appendChild(div);
                });
            },

            init() {
                if (!RESET_TOKEN || RESET_TOKEN.trim() === '') {
                    this.loading(false);
                    this.renderError('Invalid reset link. Token not found.');
                    return;
                }

                // Check if google.script.run is available
                if (typeof google === 'undefined' || !google.script || !google.script.run) {
                    console.error('Google Script not available');
                    this.loading(false);
                    this.renderError('Error: Cannot connect to server. Please make sure you are accessing the deployed web app URL, not a local file.');
                    return;
                }

                this.loading(true, 'Validating reset link...');

                // Add timeout
                const timeout = setTimeout(() => {
                    console.error('API call timeout');
                    this.loading(false);
                    this.renderError('Request timeout. The server is taking too long to respond. Please try again.');
                }, 30000);

                // Validate token
                google.script.run
                    .withSuccessHandler(result => {
                        clearTimeout(timeout);
                        this.loading(false);

                        if (result && result.valid) {
                            this.renderResetForm(result.username, result.madrasah_id);
                        } else {
                            this.renderError(result?.reason || 'Invalid or expired reset link');
                        }
                    })
                    .withFailureHandler(e => {
                        console.error('API Failure:', e);
                        clearTimeout(timeout);
                        this.loading(false);
                        this.renderError('Error validating token: ' + (e.message || e));
                    })
                    .apiValidateResetToken(RESET_TOKEN);
            },

            renderError(message) {
                document.getElementById('app').innerHTML = `
          <div class="center-screen">
            <div class="card" style="max-width:500px;text-align:center">
              <div style="font-size:4em;color:var(--color-danger);margin-bottom:20px">⚠️</div>
              <h2 style="color:var(--color-danger);margin-bottom:15px">Reset Link Invalid</h2>
              <p style="margin-bottom:25px;opacity:0.7">${message}</p>
              <p style="font-size:0.9em;opacity:0.6">
                Possible reasons:<br>
                • Link has expired<br>
                • Link has already been used<br>
                • Invalid or malformed link<br>
                • Token not passed correctly
              </p>
              <div style="margin-top:30px">
                <a href="<?!= ScriptApp.getService().getUrl() ?>" class="btn" style="text-decoration:none;display:inline-block">
                  Go to Login Page
                </a>
              </div>
              <div style="margin-top:20px;font-size:0.8em;opacity:0.6">
                Debug: Token = "${RESET_TOKEN || 'empty'}"
              </div>
            </div>
          </div>
        `;
            },

            renderResetForm(username, madrasah_id) {
                document.getElementById('app').innerHTML = `
          <div class="center-screen">
            <div class="card" style="max-width:450px">
              <h2 style="text-align:center;margin-bottom:10px">🔑 Reset Password</h2>
              <div style="text-align:center;margin-bottom:25px;padding:10px;background:var(--color-bg);border-radius:4px;border:1px solid var(--color-border)">
                <div style="font-size:0.9em;opacity:0.7">Username:</div>
                <div style="font-weight:bold;font-size:1.1em">${madrasah_id}</div>
              </div>
              
              <form id="reset-form" onsubmit="event.preventDefault(); ResetPage.submitReset(this)">
                <div class="form-group">
                  <label>Password Baru *</label>
                  <input type="password" name="password" class="form-control" required minlength="3" 
                    placeholder="Masukkan password baru">
                </div>
                <div class="form-group">
                  <label>Konfirmasi Password *</label>
                  <input type="password" name="confirm" class="form-control" required minlength="3" 
                    placeholder="Ketik ulang password baru">
                </div>
                
                <div style="background:var(--color-warning);border:1px solid var(--color-warning);padding:12px;border-radius:4px;margin-bottom:20px;font-size:0.9em;opacity:0.9">
                  <strong>💡 Tips:</strong> Gunakan password yang mudah diingat tapi aman.
                </div>
                
                <button type="submit" class="btn" style="width:100%">Reset Password</button>
              </form>
            </div>
          </div>
        `;
            },

            submitReset(form) {
                const password = form.password.value;
                const confirm = form.confirm.value;

                if (password !== confirm) {
                    this.alert('Password dan konfirmasi tidak cocok', 'Error');
                    return;
                }

                if (password.length < 3) {
                    this.alert('Password minimal 3 karakter', 'Error');
                    return;
                }

                this.loading(true, 'Resetting password...');

                // Add timeout
                const timeout = setTimeout(() => {
                    console.error('API call timeout');
                    this.loading(false);
                    this.alert('Request timeout. Please try again.', 'Error');
                }, 30000);

                google.script.run
                    .withSuccessHandler(result => {
                        clearTimeout(timeout);
                        this.loading(false);

                        if (result && result.success) {
                            this.renderSuccess();
                        } else {
                            this.alert(result?.message || 'Unknown error', 'Reset Failed');
                        }
                    })
                    .withFailureHandler(e => {
                        console.error('Reset Failure:', e);
                        clearTimeout(timeout);
                        this.loading(false);
                        this.alert('Error: ' + (e.message || e), 'Error');
                    })
                    .apiExecutePasswordReset(RESET_TOKEN, password);
            },

            renderSuccess() {
                document.getElementById('app').innerHTML = `
          <div class="center-screen">
            <div class="card" style="max-width:500px;text-align:center">
              <div style="font-size:4em;color:var(--color-success);margin-bottom:20px">✓</div>
              <h2 style="color:var(--color-success);margin-bottom:15px">Password Berhasil Direset!</h2>
              <p style="margin-bottom:25px;opacity:0.7">
                Password Anda telah berhasil diubah.<br>
                Silakan login dengan password baru Anda.
              </p>
              <div style="margin-top:30px">
                <button onclick="ResetPage.goToLogin()" class="btn" style="width:100%;padding:12px;font-size:1.1em">
                  Ke Halaman Login
                </button>
              </div>
            </div>
          </div>
        `;
            },

            goToLogin() {
                // Clear all session/local storage to prevent loading old session
                try {
                    sessionStorage.clear();
                    localStorage.clear();
                } catch (e) {
                    console.warn('Could not clear storage:', e);
                }

                // Redirect to base app URL (using server-injected URL if available)
                if (BASE_URL && BASE_URL.trim() !== '') {
                    window.top.location.href = BASE_URL;
                } else {
                    // Fallback (might be unreliable in formatting)
                    const fallbackUrl = window.location.origin + window.location.pathname;
                    window.top.location.href = fallbackUrl;
                }
            }
        };

        // Auto-init when ready
        document.addEventListener('DOMContentLoaded', () => {
            try {
                ResetPage.init();
            } catch (e) {
                console.error('Reset Page Error:', e);
                ResetPage.loading(false);
                ResetPage.renderError('Failed to initialize reset page: ' + e.message);
            }
        });
    </script>
</body>

</html>
