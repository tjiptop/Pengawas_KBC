<script>
    /**
     * ENUMERATOR APP (User)
     * Features: Offline First, SyncManager, Local Dashboard
     */
    const AppEnumerator = {
        user: null,
        init(user) {
            this.user = user;
            this.loadLocal(); // Load from LS first (critical for offline)

            // Ensure data structures exist
            if (!App.state.madrasahs) App.state.madrasahs = [];
            if (!App.state.submissions) App.state.submissions = [];
            if (!App.state.forms) App.state.forms = {};

            if (user.role === 'madrasah') {
                this.router('madrasah-detail', { madrasah_id: user.username });
                // Force Fetch Data for this role since we skip dashboard
                if (App.state.isOnline) {
                    SyncManager.fetchData().then(() => {
                        // Prevent jumping if user already navigated elsewhere
                        if (App.state.view === 'madrasah-detail') {
                            this.router('madrasah-detail', { madrasah_id: user.username });
                        }
                    });
                }
            }
            // ✨ Fasda with single assignment: go directly to detail
            else if (user.role === 'fasda' && user.assigned_madrasahs) {
                // Parse assigned_madrasahs (can be string or array)
                let ids = [];
                if (Array.isArray(user.assigned_madrasahs)) {
                    ids = user.assigned_madrasahs.map(id => String(id).trim()).filter(id => id);
                } else if (typeof user.assigned_madrasahs === 'string') {
                    ids = user.assigned_madrasahs.split(',').map(id => id.trim()).filter(id => id);
                }

                // If only 1 assigned madrasah, go directly to detail
                if (ids.length === 1) {
                    this.router('madrasah-detail', { madrasah_id: ids[0] });
                    if (App.state.isOnline) {
                        SyncManager.fetchData().then(() => {
                            if (App.state.view === 'madrasah-detail') {
                                this.router('madrasah-detail', { madrasah_id: ids[0] });
                            }
                        });
                    }
                } else {
                    // Multiple assignments: show dashboard
                    this.router('dashboard');
                }
            }
            // District, Enum, or Fasda with multiple assignments: show dashboard
            else {
                this.router('dashboard');
            }
            Utils.loading(false);
        },

        onOnline() {
            // Trigger auto-sync when back online
            if (App.state.isOnline) SyncManager.syncAll();
        },

        loadLocal() {
            const m = localStorage.getItem('sa_madrasahs');
            const s = localStorage.getItem('sa_submissions');
            const f = localStorage.getItem('sa_forms');
            const t = localStorage.getItem('sa_tokens');

            // Safe parse with "undefined" string guard
            const safeParse = (str, fallback) => {
                if (!str || str === 'undefined' || str === 'null') return fallback;
                try {
                    return JSON.parse(str);
                } catch (e) {
                    console.error('JSON parse error:', e, str);
                    return fallback;
                }
            };

            App.state.madrasahs = safeParse(m, []);
            App.state.submissions = safeParse(s, []);
            App.state.forms = safeParse(f, {});
            App.state.my_tokens = safeParse(t, []);
        },

        saveLocal() {
            localStorage.setItem('sa_madrasahs', JSON.stringify(App.state.madrasahs));
            localStorage.setItem('sa_submissions', JSON.stringify(App.state.submissions));
            localStorage.setItem('sa_forms', JSON.stringify(App.state.forms));
            localStorage.setItem('sa_tokens', JSON.stringify(App.state.my_tokens || []));
        },

        router(route, params) {
            App.state.view = route;
            const el = document.getElementById('app');
            window.scrollTo(0, 0);

            // 1. Dashboard
            if (route == 'dashboard') {
                if (this.user.role === 'madrasah') return this.router('madrasah-detail', { madrasah_id: this.user.username });
                el.innerHTML = EnumeratorViews.Dashboard(this.user, App.state.madrasahs);

                if (App.state.isOnline) {
                    SyncManager.fetchData().then(() => {
                        // Prevent overwrite if user moved away
                        if (App.state.view === 'dashboard') {
                            el.innerHTML = EnumeratorViews.Dashboard(this.user, App.state.madrasahs);
                        }
                    });
                }

                // 2. Madrasah Detail
            } else if (route == 'madrasah-detail') {
                // params is madrasah object (or we find it)
                const m = App.state.madrasahs.find(x => x.madrasah_id == params.madrasah_id) || params;
                const subs = App.state.submissions.filter(s => s.madrasah_id == m.madrasah_id);
                el.innerHTML = EnumeratorViews.MadrasahDetail(m, App.state.forms, subs);

                // Fetch fresh data to update tokens if online
                if (App.state.isOnline) {
                    SyncManager.fetchData().then(() => {
                        // Re-render if still on this view
                        if (App.state.view === 'madrasah-detail' && App.state.madrasahs) {
                            const updatedM = App.state.madrasahs.find(x => x.madrasah_id == params.madrasah_id) || params;
                            const updatedSubs = App.state.submissions.filter(s => s.madrasah_id == updatedM.madrasah_id);
                            el.innerHTML = EnumeratorViews.MadrasahDetail(updatedM, App.state.forms, updatedSubs);
                        }
                    });
                }

                // 3. Survey
            } else if (route == 'survey') {
                let { madrasah, formId, madrasah_id } = params;

                // Flexible handling: resolve madrasah from ID if object not provided
                if (!madrasah && madrasah_id) {
                    madrasah = App.state.madrasahs.find(x => x.madrasah_id == madrasah_id);
                }
                // Fallback struct if still not found (rare, but prevents crash)
                if (!madrasah) madrasah = { madrasah_id: madrasah_id || '-', name: 'Unknown Madrasah' };

                const yaml = App.state.forms[formId];
                if (!yaml) return Utils.alert("Form definition not found");

                // Limits Logic
                // We'll skip complex limit logic for now or implement basic check
                // Implement Basic Limit (1 per user per form?) - kept from original
                try {
                    const def = jsyaml.load(yaml);
                    const limit = def.submission_limit !== undefined ? parseInt(def.submission_limit) : -1;
                    const mySubs = App.state.submissions.filter(s =>
                        s.madrasah_id == madrasah.madrasah_id && s.form_id == formId
                    );

                    // ✅ DECLARE prefill variable
                    let prefill = {};

                    if (limit >= 1 && mySubs.length >= limit) {
                        Utils.alert(`Quota reached. Limit: ${limit}.`, "Survey Limit Reached");
                        this.router('madrasah-detail', madrasah);
                        return;
                    }

                    if (limit === 0 && mySubs.length > 0) {
                        // Edit Mode (Last submission)
                        mySubs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                        try { prefill = JSON.parse(mySubs[0].data_json); } catch (e) { }
                        // Pass existing ID to overwrite
                        if (mySubs[0]) madrasah.submission_id_override = mySubs[0].submission_id;
                    }

                    el.innerHTML = EnumeratorViews.SurveyContainer(madrasah, def.title);
                    FormEngine.init('survey-area', yaml, prefill, (data) => {
                        SyncManager.submit(data, madrasah.madrasah_id, formId, madrasah.submission_id_override);
                    }, formId, madrasah); // Pass madrasah object as context


                } catch (e) { Utils.alert("Error: " + e.message); this.router('madrasah-detail', madrasah); }
            } else if (route == 'submission-detail') {
                const sub = App.state.submissions.find(s => s.submission_id === params.submission_id);
                if (!sub) {
                    App.showContent('<div class="card">Submission not found.</div>');
                    return;
                }

                // ⚡ PERFORMANCE: Use cached parsed form
                const formDefYaml = App.state.forms[sub.form_id];
                const def = formDefYaml ? App.getParsedForm(sub.form_id) : { title: sub.form_id };
                console.log('🔍 Loading submission detail, formId:', sub.form_id, 'def:', def ? def.title : 'NO DEF', 'questions:', def && def.questions ? def.questions.length : 0);

                const readOnly = params.readOnly !== undefined ? params.readOnly : true;
                const form = FormEngine.render(sub.form_id, def, sub.data_json, readOnly);
                el.innerHTML = EnumeratorViews.SubmissionDetail(sub, def, readOnly);
            }
        },

        confirmExit(madrasahId) {
            if (FormEngine.hasUnsavedChanges) {
                Utils.confirm('You have unsaved changes. Exit anyway?', () => {
                    FormEngine.hasUnsavedChanges = false;
                    this.router('madrasah-detail', { madrasah_id: madrasahId });
                });
            } else {
                this.router('madrasah-detail', { madrasah_id: madrasahId });
            }
        }
    };

    const SyncManager = {
        fetchData() {
            // Fetch everything for this user
            return new Promise(res => {
                google.script.run.withSuccessHandler(r => {
                    if (!App.state.user) return; // Guard: User logged out
                    App.state.madrasahs = r.madrasahs;
                    App.state.forms = r.forms;
                    App.state.madrasahs = r.madrasahs; // Update structural data
                    App.state.my_tokens = r.my_tokens || []; // Update tokens
                    const serverSubs = r.submissions || [];

                    // Merge Outbox (Pending)
                    const outbox = JSON.parse(localStorage.getItem('sa_outbox') || '[]');
                    const pendingVars = outbox.map(o => ({
                        submission_id: o.submission_id,
                        madrasah_id: o.madrasah_id,
                        form_id: o.form_id,
                        timestamp: o.timestamp,
                        data_json: JSON.stringify(o.data),
                        username: o.username,
                        is_pending: true
                    }));

                    App.state.submissions = [...serverSubs, ...pendingVars]; // Prefer Server + Pending
                    AppEnumerator.saveLocal();
                    res();
                }).withFailureHandler(res).apiFetchData(AppEnumerator.user.username);
            });
        },

        async submit(data, mid, fid, existingId = null) {
            // If existingId provided (Update/Edit Mode), use it. Else generate new.
            const uid = existingId || ('sub-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9));

            // Process Files First (Upload to Drive)
            Utils.loading(true, "Processing Files...");
            let cleanData;
            try {
                cleanData = await Utils.processFileUploads(data);
            } catch (e) {
                Utils.loading(false);
                Utils.alert(e.message, "Upload Failed");
                return;
            }

            // 🔒 SANITIZE DATA before submission
            // Get form definition to identify Base64 fields
            const formDefYaml = App.state.forms ? App.state.forms[fid] : null;
            let skipKeys = [];
            if (formDefYaml) {
                try {
                    const yaml = jsyaml.load(formDefYaml);
                    skipKeys = Security.getBase64FieldsFromDef(yaml);
                } catch (e) {
                    console.warn('Could not parse form def for sanitization:', e);
                }
            }

            // Sanitize all data except Base64 fields
            const sanitizedData = Security.sanitizeObject(cleanData, {
                skipKeys: skipKeys,
                formulaProtection: true,
                htmlProtection: true
            });

            const p = {
                submission_id: uid,
                madrasah_id: mid,
                form_id: fid,
                username: AppEnumerator.user.username,
                timestamp: new Date().toISOString(),
                data: sanitizedData
            };

            if (!App.state.isOnline) return this.saveOffline(p);

            Utils.loading(true, "Submitting...");
            google.script.run.withSuccessHandler(r => {
                Utils.loading(false);
                if (r.success) {
                    // Check for failed uploads
                    if (r.failed_uploads && r.failed_uploads.length > 0) {
                        // ⚠️ FILES FAILED - Stay in form for user to fix
                        // Do NOT redirect, let user see error and re-upload
                        if (FormEngine.handleFailedUploads) {
                            FormEngine.handleFailedUploads(r.failed_uploads, false); // Re-render to show changes
                        }
                        // Don't call router - keep form open!
                        return; // Exit early, don't redirect
                    }

                    // ✅ ALL FILES SUCCEEDED - Proceed normally
                    Utils.alert("Success", "Submitted");
                    this.logLocal(p, false); // Not pending
                    // Safe navigation: fallback to minimal object if madrasah not found
                    const madrasah = App.state.madrasahs.find(m => m.madrasah_id == mid) || { madrasah_id: mid };
                    AppEnumerator.router('madrasah-detail', madrasah);
                } else {
                    Utils.alert("Failed: " + r.message);
                    this.saveOffline(p);
                }
            }).withFailureHandler(() => {
                Utils.loading(false);
                this.saveOffline(p);
            }).apiSubmitSurvey(p);
        },

        saveOffline(p) {
            Utils.loading(false); // Stop loading indicator
            let out = JSON.parse(localStorage.getItem('sa_outbox') || '[]');
            if (!out.find(x => x.submission_id === p.submission_id)) {
                out.push(p);
                localStorage.setItem('sa_outbox', JSON.stringify(out));
            }
            this.logLocal(p, true);
            Utils.alert("Saved Offline", "Offline Mode");
            // Safe navigation: fallback to minimal object if madrasah not found
            const madrasah = App.state.madrasahs.find(m => m.madrasah_id == p.madrasah_id) || { madrasah_id: p.madrasah_id };
            AppEnumerator.router('madrasah-detail', madrasah);
        },

        logLocal(p, pending) {
            // Update local submissions list for display
            // Remove duplication if exists
            App.state.submissions = App.state.submissions.filter(s => s.submission_id !== p.submission_id);
            App.state.submissions.push({
                submission_id: p.submission_id,
                madrasah_id: p.madrasah_id,
                form_id: p.form_id,
                timestamp: p.timestamp,
                data_json: JSON.stringify(p.data),
                username: p.username,
                is_pending: pending
            });
            AppEnumerator.saveLocal();
        },

        async syncAll() {
            let out = JSON.parse(localStorage.getItem('sa_outbox') || '[]');
            if (out.length === 0) return;

            Utils.loading(true, `Syncing ${out.length} items...`);

            // Sequential Sync
            for (let i = 0; i < out.length; i++) {
                const item = out[i];
                try {
                    await new Promise((res, rej) => {
                        google.script.run.withSuccessHandler(r => {
                            if (r.success || r.message.includes('Duplicate')) res();
                            else rej(r.message);
                        }).withFailureHandler(rej).apiSubmitSurvey(item);
                    });
                    // Remove from outbox if success
                    out.splice(i, 1);
                    i--; // adjust index
                } catch (err) {
                    console.error(`Failed to sync ${item.submission_id}:`, err);
                    // Stop syncing others? Or continue? Continue might be better, but user might want to know.
                }
            }

            Utils.loading(false);

            // Save updated outbox
            localStorage.setItem('sa_outbox', JSON.stringify(out));

            // ✅ Refresh data from server after sync
            this.fetchData().then(() => {
                if (App.state.view == 'dashboard') AppEnumerator.router('dashboard');
                else if (App.state.view == 'madrasah-detail') {
                    // Re-render current madrasah detail if in that view
                    const currentMadrasahId = App.state.madrasahs.find(m =>
                        App.state.submissions.some(s => s.madrasah_id === m.madrasah_id)
                    )?.madrasah_id;
                    if (currentMadrasahId) {
                        AppEnumerator.router('madrasah-detail', { madrasah_id: currentMadrasahId });
                    }
                }
            });
        }
    };

    const EnumeratorViews = {
        Dashboard: (u, madrasahs) => {
            if (!madrasahs || madrasahs.length === 0) return '<div style="padding:40px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center"><div class="spinner"></div><p style="color:#666;margin-top:10px">Loading data...</p></div>';

            const syncBtn = `<button class="btn" style="margin-top:10px;background:#17a2b8" onclick="SyncManager.syncAll()">Sync Now</button>`;

            // Grouping Logic
            const groups = {};
            madrasahs.forEach(m => {
                const p = m.province || 'Lain-lain';
                if (!groups[p]) groups[p] = {};
                const d = m.district || 'Umum';
                if (!groups[p][d]) groups[p][d] = [];
                groups[p][d].push(m);
            });

            // Render Nested Collapsible (Cascade Slide)
            const list = Object.keys(groups).sort().map((prov, i) => {
                const districts = groups[prov];
                const distKeys = Object.keys(districts).sort();
                const totalDist = distKeys.length;
                let totalMadrasah = 0;
                distKeys.forEach(k => totalMadrasah += districts[k].length);

                const pid = `prov-${i}`;

                // Nested District Accordions
                const distHtml = distKeys.map((dName, j) => {
                    const mList = districts[dName].sort((a, b) => {
                        return (a.name || '').localeCompare(b.name || '');
                    }).map(x => {
                        // Reset password icon - only for District role (same as header change password)
                        const resetBtn = (u.role === 'district')
                            ? `<span onclick="event.stopPropagation(); App.showPasswordResetModal('${x.madrasah_id}', '${x.name.replace(/'/g, "\\'")}');" title="Reset Password" style="cursor:pointer;margin-left:6px;font-size:1em">🔐</span>`
                            : '';

                        const lvlClass = x.level ? `badge-${String(x.level).toLowerCase()}` : '';
                        const lvlBadge = x.level ? `<span class="badge-level ${lvlClass}" style="font-size:0.6em;margin-left:5px">${x.level}</span>` : '';

                        return `<div class="card" style="margin:5px 0 10px 10px;border-left:4px solid var(--color-primary);cursor:pointer" onclick="AppEnumerator.router('madrasah-detail',{madrasah_id:'${x.madrasah_id}'})">
                           <h4 style="margin:0;display:flex;align-items:center;justify-content:space-between;gap:8px">
                              <span>${x.name}</span>
                              ${lvlBadge}
                           </h4>
                           <small style="display:block;margin-top:4px;opacity:0.8">NSM: ${x.nsm}${resetBtn}</small>
                           ${x.submission_count != null ? `<small style="display:block;margin-top:2px;opacity:0.8">Synced: ${x.submission_count}</small>` : ''}
                        </div>`
                    }).join('');

                    const did = `dist-${i}-${j}`;
                    const dCount = districts[dName].length;

                    return `
                    <div style="margin:10px 0 10px 10px;border-left:1px solid var(--color-border);padding-left:5px">
                        <div class="form-btn-group" style="background:var(--color-bg-elevated);border-bottom:1px solid var(--color-border);margin-bottom:5px" onclick="document.getElementById('${did}').classList.toggle('open')">
                             <button class="form-btn-main" style="padding:10px 12px;font-size:1rem;font-weight:600">
                                ${dName}
                             </button>
                             <div class="form-count-badge" style="font-weight:normal;font-size:0.85em;background:var(--color-bg-elevated)">
                                ${dCount} Mad &nbsp; &#10095;
                             </div>
                        </div>
                        <div id="${did}" class="history-slide open">
                            ${mList}
                        </div>
                    </div>`;
                }).join('');

                const pCount = totalMadrasah;

                return `
                <div class="form-row" style="margin-bottom:5px">
                    <div class="form-btn-group" onclick="document.getElementById('${pid}').classList.toggle('open')">
                         <button class="form-btn-main" style="font-size:1.1rem;font-weight:bold;color:var(--color-primary)">
                            ${prov}
                         </button>
                         <div class="form-count-badge" style="font-weight:normal;font-size:0.85em;background:var(--color-bg-elevated)">
                            ${totalDist} Dist / ${pCount} Mad &nbsp; &#10095;
                         </div>
                    </div>
                    <div id="${pid}" class="history-slide open" style="background:var(--color-bg);border-top:1px solid var(--color-border);padding-bottom:5px">
                        ${distHtml}
                    </div>
                </div>`;
            }).join('');

            // Generate Link button REMOVED (Moved to Delegasi Forms)
            const generateLinkBtn = '';

            return `<div class="header">
                        <div style="display:flex;align-items:center;gap:10px">
                            <div class="menu-dropdown">
                                <button class="menu-btn" onclick="event.stopPropagation(); document.getElementById('dashboard-menu').classList.toggle('show')">⋮</button>
                                <div id="dashboard-menu" class="menu-dropdown-content">
                                    <div class="menu-item" onclick="App.showChangePassword(); document.getElementById('dashboard-menu').classList.remove('show')">
                                        <span class="menu-item-icon">🔑</span>
                                        <span class="menu-item-text">Change Password</span>
                                    </div>
                                    <div class="menu-item" onclick="SyncManager.fetchData().then(() => AppEnumerator.router('dashboard')); document.getElementById('dashboard-menu').classList.remove('show')">
                                        <span class="menu-item-icon">🔄</span>
                                        <span class="menu-item-text">Refresh</span>
                                    </div>
                                </div>
                            </div>
                            <h1>Dashboard</h1>
                        </div>
                        <button class="logout-btn" onclick="App.logout()">Logout</button>
                    </div>
                    <div class="content">
                    <p style="margin-bottom:15px">
                        <span>Welcome, <b>${u.full_name}</b></span>
                    </p>
                    ${list}
                    
                    </div>`;
        },

        MadrasahDetail: (m, forms, submissions) => {
            const renderForms = () => {
                if (!forms) return '';

                // --- PRE-GROUP FORMS by 'group' field in YAML for Pretty Accordion UI ---
                const formGroups = {};

                // ✅ SORT form keys to ensure consistent order (prevents UI jumping)
                Object.keys(forms).sort().forEach(k => {
                    try {
                        const yaml = forms[k];
                        const parsed = jsyaml.load(yaml);
                        const groupName = parsed.group || 'Other Forms';

                        if (!formGroups[groupName]) formGroups[groupName] = [];
                        formGroups[groupName].push({ id: k, def: parsed, yaml: yaml });
                    } catch (e) {
                        console.error(`Error parsing form ${k}:`, e);
                    }
                });

                // Render each group
                return Object.keys(formGroups).sort().map((groupName, groupIdx) => {
                    const groupId = `group-${groupIdx}`;
                    const groupForms = formGroups[groupName];

                    // ✨ SORT BY TITLE (Numeric Aware: 1.1, 1.2, 1.10)
                    groupForms.sort((a, b) => {
                        const titleA = (a.def.title || a.id).toLowerCase();
                        const titleB = (b.def.title || b.id).toLowerCase();
                        return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
                    });

                    // Render forms within this group
                    const formsHtml = groupForms.map(({ id: k, yaml, def }) => {
                        const title = def.title || k;
                        const limit = def.submission_limit !== undefined ? parseInt(def.submission_limit) : -1;

                        // ✨ VISIBILITY CONTROL: Check if current user can access this form
                        const currentUser = App.state.user;
                        const allowedRoles = def.allowed_roles || [];

                        // ✅ Use Utils.isRoleAllowed for role compatibility (Enum=district, Fasda=madrasah)
                        const isAllowed = Utils.isRoleAllowed(allowedRoles, currentUser.role);

                        // If user not in allowed_roles, check subordinate visibility
                        if (!isAllowed) {
                            const visibility = def.subordinate_visibility || 'hidden';

                            if (visibility === 'hidden') {
                                return ''; // Don't render this form
                            }

                            // For 'list' and 'full', we still need to show the form
                            // but with different rendering
                        }

                        // Filter submissions for this form
                        const mySubs = submissions.filter(s => s.form_id == k);
                        // Sort descending
                        mySubs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                        // ✨ LIST-ONLY VIEW for subordinates
                        if (!isAllowed && def.subordinate_visibility === 'list') {
                            const count = mySubs.length;
                            const listId = `hist-${k}`;
                            const historyList = mySubs.map(s => `
                                <div class="history-item" style="cursor:default;opacity:0.7">
                                    <span>${Utils.formatDate(s.timestamp)}</span>
                                    <span>🚫</span>
                                </div>
                            `).join('');

                            return `
                            <div class="form-row">
                                <div class="form-btn-group">
                                    <button class="form-btn-main" style="cursor:default;opacity:0.8;background:var(--color-bg-elevated);color:var(--color-text)">
                                        ${title} <small style="opacity:0.6">(District Only)</small>
                                    </button>
                                    <div class="form-count-badge" onclick="document.getElementById('${listId}').classList.toggle('open')">
                                        ${count} &nbsp; &#10095;
                                    </div>
                                </div>
                                <div id="${listId}" class="history-slide">
                                    ${historyList || '<div style="padding:10px;color:#999;font-size:0.9em">No history</div>'}
                                </div>
                            </div>`;
                        }

                        // ✨ DELEGASI BUTTON (Common Logic)
                        // Check if there are active delegations

                        else if (name.match(/\.(ppt|pptx)$/i)) type = '📙';
                        else if (name.match(/\.(mp3|wav|ogg)$/i)) type = '🎵';

                        v = `<a href="${url}" class="btn" style="display:flex;align-items:center;padding:12px;background:var(--color-bg-elevated);color:var(--color-text);border:1px solid var(--color-border);border-radius:6px;text-decoration:none;gap:10px" target="_blank" download="${name}">
                             <span style="font-size:1.5em">${type}</span> 
                             <div style="flex:1;overflow:hidden">
                                <div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
                                <div style="font-size:0.8em;color:var(--color-text-secondary)">${sizeKB > 0 ? sizeKB + ' KB' : 'Download'}</div>
                             </div>
                             <span style="font-size:1.2em;color:var(--color-primary)">📥</span>
                        </a>`;
                    } return `<div class="detail-item"><div class="detail-label">${q.label || q.name}</div><div class="detail-value">${v}</div></div>`;
                }).filter(Boolean).join('');

            } catch (e) {
                console.error('❌ Error rendering submission detail:', e);
                console.error('Stack:', e.stack);
                content = `<div style="padding:20px;color:red">
                    <strong>Error rendering submission:</strong><br>
                    ${e.message}<br>
                    <small style="opacity:0.7">Check console for details</small>
                </div>`;
            }

            // BACK NAVIGATION FIX
            const backAction = sub.madrasah_id
                ? `AppEnumerator.router('madrasah-detail', {madrasah_id:'${sub.madrasah_id}'})`
                : `AppEnumerator.router('dashboard')`;

            // ✨ Print Button - Icon only, transparent
            const printButton = `<button class="btn no-print" onclick="window.print()" style="background:transparent;border:none;font-size:1.5rem;cursor:pointer;margin-left:5px;padding:0" title="Cetak sebagai bukti pengisian">🖨️</button>`;

            return `<style>
                        @media print {
                            .no-print { display: none !important; }
                            .header { display: none !important; } 
                            body { padding: 0; }
                            .card { box-shadow: none !important; border: none !important; padding: 0 !important; }
                        }
                    </style>
                    <div class="header">
                        <div>
                            <h1 style="margin:0;font-size:1.3rem">Submission Detail</h1>
                        </div>
                        <div class="no-print" style="display:flex;align-items:center">
                            ${printButton}
                            <button class="back-btn" onclick="${backAction}" style="margin-left:10px">Back</button>
                        </div>
                    </div>
                    <div class="card" style="padding:24px">
                        ${viewOnlyBanner}
                        <div style="background:var(--color-bg-elevated);padding:16px;border-radius:6px;margin-bottom:20px;border-left:4px solid var(--color-primary)">
                            <h2 style="margin:0 0 5px 0;font-size:1.1rem;color:var(--color-primary)">📋 ${formTitle}</h2>
                            <div style="font-size:0.75em;opacity:0.7;margin-top:4px;line-height:1.4">
                                <div>Madrasah: ${sub.madrasah_id}</div>
                                <div>ID: ${sub.submission_id}</div>
                                <div>${Utils.formatDate(sub.timestamp)}</div>
                            </div>
                        </div>
                        <div class="detail-list">${content}</div>
                    </div>`;
        }
    };
</script>
